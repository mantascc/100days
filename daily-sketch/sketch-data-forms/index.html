<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>data-forms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap">
  <style>
    :root {
      --ground-void:    #0a0a0a;
      --ground-base:    #0f0f0f;
      --ground-raised:  #141414;
      --ground-surface: #1a1a1a;
      --text-primary:   #ffffff;
      --text-default:   #f5f5f7;
      --text-secondary: #a8aab8;
      --text-tertiary:  #666666;
      --text-ghost:     #333333;
      --border-default: #2a2a2a;
      --accent:         #00a8ff;
      --mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--ground-void);
      color: var(--text-default);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* ── toolbar ── */
    #toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border-default);
      background: var(--ground-base);
      z-index: 10;
    }

    #chapter-counter {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      min-width: 40px;
    }

    #chapter-name {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: border-color 0.1s, color 0.1s;
    }

    .nav-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .nav-btn.disabled { opacity: 0.2; pointer-events: none; }

    /* ── grid ── */
    #grid {
      position: fixed;
      top: 48px; bottom: 0; left: 0; right: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 1px;
      background: var(--border-default);
    }

    .card {
      background: var(--ground-base);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-ghost);
      padding: 8px 12px 6px;
      flex-shrink: 0;
    }

    .cell {
      flex: 1;
      position: relative;
    }

    .cell canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button class="nav-btn disabled" id="btn-prev">prev</button>
  <span id="chapter-counter">01 / 04</span>
  <span id="chapter-name">chart-types</span>
  <button class="nav-btn" id="btn-next">next</button>
</div>

<div id="grid"></div>

<script type="module" src="main.js"></script>

</body>
</html>
