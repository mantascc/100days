<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>color explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #080808;
      color: #f5f5f7;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    /* ── CANVAS STAGE ── */
    #stage {
      position: fixed; inset: 0;
    }
    #stage canvas {
      width: 100%; height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    /* ── TOP NAV ── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: 44px;
      display: flex; align-items: center;
      padding: 0 20px; gap: 2px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(8,8,8,0.85) 0%, transparent 100%);
      pointer-events: none;
    }
    #nav > * { pointer-events: auto; }

    .nav-title {
      font-size: 10px; letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      margin-right: 20px;
    }
    .nav-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      background: none; border: none;
      padding: 8px 10px;
      cursor: pointer;
      transition: color 0.1s;
      position: relative;
    }
    .nav-btn:hover { color: rgba(255,255,255,0.65); }
    .nav-btn.active { color: #ffffff; }
    .nav-btn.active::after {
      content: '';
      position: absolute; bottom: 4px; left: 10px; right: 10px;
      height: 1px;
      background: currentColor;
    }

    /* ── CHAPTER LABEL (bottom-left corner) ── */
    #chapter-label {
      position: fixed; bottom: 56px; left: 20px;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .cl-num {
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }
    .cl-desc {
      font-size: 10px; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.12);
      margin-top: 3px;
    }

    /* ── COLOR BAR (bottom) ── */
    #colorbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 44px;
      display: flex; align-items: center;
      padding: 0 20px; gap: 20px;
      z-index: 100;
      background: linear-gradient(to top, rgba(8,8,8,0.9) 0%, transparent 100%);
    }
    .cg {
      display: flex; align-items: center; gap: 6px;
    }
    .chip-wrap {
      width: 14px; height: 14px;
      position: relative; cursor: pointer;
      flex-shrink: 0;
    }
    .chip-wrap input[type="color"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .chip-face {
      width: 14px; height: 14px;
      pointer-events: none;
      transition: transform 0.1s;
    }
    .chip-wrap:hover .chip-face { transform: scale(1.3); }
    .chex {
      font-size: 11px; letter-spacing: 0.04em;
      background: none; border: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.4);
      font-family: 'JetBrains Mono', monospace;
      width: 68px; padding: 2px 0;
      outline: none;
      transition: color 0.1s, border-color 0.1s;
    }
    .chex:focus { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.35); }

    /* ── SET CHAPTER (HTML, not canvas) ── */
    #set-chapter {
      position: fixed; inset: 0;
      display: none;
      z-index: 50;
    }
    #set-chapter.visible { display: flex; }
    .set-bands { display: flex; width: 100%; height: 100%; }
    .set-band {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 60px 32px;
      cursor: pointer;
      transition: flex 0.5s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .set-band:hover { flex: 1.6; }
    .band-big {
      font-size: clamp(22px, 3.5vw, 52px);
      font-weight: 300; letter-spacing: -0.02em;
      line-height: 1; margin-bottom: 10px;
    }
    .band-sub {
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; opacity: 0.5;
    }
    .band-vals {
      font-size: 10px; letter-spacing: 0.05em;
      opacity: 0.35; margin-top: 6px; line-height: 1.8;
    }
    .set-band-photo {
      flex: 1; position: relative; overflow: hidden;
      cursor: default;
      transition: flex 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .set-band-photo:hover { flex: 1.6; }
    .set-band-photo img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block; filter: saturate(0.85);
    }
    .set-band-photo-label {
      position: absolute; bottom: 60px; left: 32px;
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>

<nav id="nav">
  <span class="nav-title">color</span>
</nav>

<div id="set-chapter"></div>

<div id="stage"><canvas id="cv"></canvas></div>

<div id="chapter-label">
  <div class="cl-num" id="cl-num"></div>
  <div class="cl-desc" id="cl-desc"></div>
</div>

<div id="colorbar">
  <div class="cg">
    <div class="chip-wrap"><div class="chip-face" id="chip0"></div><input type="color" id="picker0" value="#7b6fa5"></div>
    <input class="chex" id="hex0" value="#7b6fa5" maxlength="7">
  </div>
  <div class="cg">
    <div class="chip-wrap"><div class="chip-face" id="chip1"></div><input type="color" id="picker1" value="#9d91b0"></div>
    <input class="chex" id="hex1" value="#9d91b0" maxlength="7">
  </div>
  <div class="cg">
    <div class="chip-wrap"><div class="chip-face" id="chip2"></div><input type="color" id="picker2" value="#9e6240"></div>
    <input class="chex" id="hex2" value="#9e6240" maxlength="7">
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// MATH
// ═══════════════════════════════════════════
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi,v));
const clamp01 = v => clamp(v,0,1);
const dist2 = (x1,y1,x2,y2) => Math.sqrt((x2-x1)**2+(y2-y1)**2);
const TAU = Math.PI * 2;

function hash(a, b=0) {
  const x = Math.sin(a*127.1 + b*311.7) * 43758.5453;
  return x - Math.floor(x);
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.round(clamp(v,0,255)).toString(16).padStart(2,'0')).join('');
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s, l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}
function lerpRgb(a,b,t){return[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)];}
function blend3(c1,c2,c3,w1,w2,w3){
  const tot=w1+w2+w3+1e-9;
  return[(c1[0]*w1+c2[0]*w2+c3[0]*w3)/tot,(c1[1]*w1+c2[1]*w2+c3[1]*w3)/tot,(c1[2]*w1+c2[2]*w2+c3[2]*w3)/tot];
}
function luminance(hex){
  const [r,g,b]=hexToRgb(hex).map(v=>{v/=255;return v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4;});
  return 0.2126*r+0.7152*g+0.0722*b;
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const colors = ['#7b6fa5','#9d91b0','#9e6240'];
const rgb = () => colors.map(hexToRgb);

// ═══════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let W, H;
function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if(activeChapter) startChapter(activeChapter); });

// Offscreen pixel buffer (reused, never recreated unless size changes)
const pxBuf = { canvas: null, ctx: null, w:0, h:0, img:null };
function getPxBuf(w, h) {
  if (pxBuf.w !== w || pxBuf.h !== h) {
    pxBuf.canvas = document.createElement('canvas');
    pxBuf.canvas.width = w; pxBuf.canvas.height = h;
    pxBuf.ctx = pxBuf.canvas.getContext('2d');
    pxBuf.img = pxBuf.ctx.createImageData(w, h);
    pxBuf.w = w; pxBuf.h = h;
  }
  return pxBuf;
}

// ═══════════════════════════════════════════
// CHAPTERS
// ═══════════════════════════════════════════

let rafId = null;
let activeChapter = null;
let chData = {};

function stopAll() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  ctx.clearRect(0, 0, W, H);
  document.getElementById('set-chapter').classList.remove('visible');
  document.getElementById('stage').style.opacity = '1';
}

// ─────────────────────────────────────────
// set: three full-screen color bands
// ─────────────────────────────────────────
function startSet() {
  stopAll();
  document.getElementById('stage').style.opacity = '0';
  const el = document.getElementById('set-chapter');
  el.innerHTML = '';
  const bands = document.createElement('div');
  bands.className = 'set-bands';

  colors.forEach((hex, i) => {
    const [r,g,b] = hexToRgb(hex);
    const [h,s,l] = rgbToHsl(r,g,b);
    const dark = luminance(hex) > 0.35;
    const fg = dark ? 'rgba(0,0,0,0.55)' : 'rgba(255,255,255,0.55)';
    const fgSub = dark ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.3)';

    const band = document.createElement('div');
    band.className = 'set-band';
    band.style.background = hex;
    band.innerHTML = `
      <div class="band-big" style="color:${fg}">${hex}</div>
      <div class="band-sub" style="color:${fgSub}">color 0${i+1}</div>
      <div class="band-vals" style="color:${fgSub}">hsl(${h}, ${s}%, ${l}%)<br>rgb(${r}, ${g}, ${b})</div>
    `;
    band.addEventListener('click', () => document.getElementById(`picker${i}`).click());
    bands.appendChild(band);
  });

  // Photo source panel — first
  const photoPanel = document.createElement('div');
  photoPanel.className = 'set-band-photo';
  photoPanel.innerHTML = `
    <img src="PXL_20260328_182300123.jpg" alt="source">
    <div class="set-band-photo-label">source</div>
  `;
  bands.insertBefore(photoPanel, bands.firstChild);

  el.appendChild(bands);
  el.classList.add('visible');
}

// ─────────────────────────────────────────
// field: per-pixel inverse-distance color field
// ─────────────────────────────────────────
function startField() {
  stopAll();
  const SCALE = 6;
  let t = 0;
  const dt = 0.0035;

  // pre-compute sun orbit params
  const orbits = [
    { r: 0.3, speed: 0.7,  phase: 0 },
    { r: 0.32, speed: 0.5, phase: TAU*0.333 },
    { r: 0.27, speed: 0.6, phase: TAU*0.667 },
  ];

  function frame() {
    const [c1,c2,c3] = rgb();
    const BW = Math.ceil(W/SCALE);
    const BH = Math.ceil(H/SCALE);
    const { canvas:bc, ctx:bctx, img } = getPxBuf(BW, BH);
    const d = img.data;

    const cx = BW*0.5, cy = BH*0.5;
    const suns = orbits.map((o,oi) => [
      cx + Math.cos(t*o.speed + o.phase) * cx * o.r * 1.6,
      cy + Math.sin(t*(o.speed*0.73) + o.phase) * cy * o.r * 1.4,
    ]);

    const cols = [c1,c2,c3];
    const FALLOFF = 1.6;

    for (let y=0; y<BH; y++) {
      for (let x=0; x<BW; x++) {
        let w1=0, w2=0, w3=0;
        const [sx1,sy1]=suns[0], [sx2,sy2]=suns[1], [sx3,sy3]=suns[2];
        const d1=dist2(x,y,sx1,sy1), d2=dist2(x,y,sx2,sy2), d3=dist2(x,y,sx3,sy3);
        w1 = 1/(Math.pow(d1, FALLOFF)+0.8);
        w2 = 1/(Math.pow(d2, FALLOFF)+0.8);
        w3 = 1/(Math.pow(d3, FALLOFF)+0.8);
        const [r,g,b] = blend3(c1,c2,c3,w1,w2,w3);
        const i4 = (y*BW+x)*4;
        d[i4]=r; d[i4+1]=g; d[i4+2]=b; d[i4+3]=255;
      }
    }

    bctx.putImageData(img, 0, 0);
    ctx.drawImage(bc, 0, 0, W, H);

    t += dt;
    rafId = requestAnimationFrame(frame);
  }
  frame();
}

// ─────────────────────────────────────────
// wave: interference from 3 colored sources
// ─────────────────────────────────────────
function startWave() {
  stopAll();
  const SCALE = 3;
  let t = 0;
  const dt = 0.022;

  // source configs: freq multiplier, speed
  const srcs = [
    { fx: 0.07, speed: 1.0,  phase: 0 },
    { fx: 0.09, speed: 1.37, phase: 1.1 },
    { fx: 0.06, speed: 0.82, phase: 2.3 },
  ];

  // positions move slowly
  const spos = [
    { rx:0.28, ry:0.45, ax:0.06, ay:0.05, pax:0, pay:1.1 },
    { rx:0.72, ry:0.35, ax:0.05, ay:0.08, pax:2.0, pay:0 },
    { rx:0.5,  ry:0.7,  ax:0.07, ay:0.04, pax:1.3, pay:2.5 },
  ];

  function frame() {
    const [c1,c2,c3] = rgb();
    const BW = Math.ceil(W/SCALE);
    const BH = Math.ceil(H/SCALE);
    const { canvas:bc, ctx:bctx, img } = getPxBuf(BW, BH);
    const dat = img.data;

    const positions = spos.map((s,si) => [
      BW*(s.rx + Math.sin(t*0.3+s.pax)*s.ax),
      BH*(s.ry + Math.cos(t*0.25+s.pay)*s.ay),
    ]);
    const cols = [c1,c2,c3];

    for (let y=0; y<BH; y++) {
      for (let x=0; x<BW; x++) {
        let r=0, g=0, b=0;

        srcs.forEach((s,si) => {
          const [px,py] = positions[si];
          const d = dist2(x,y,px,py);
          // wave: -1 to 1
          const wave = Math.cos(d*s.fx - t*s.speed + s.phase);
          // map to 0..1, squared for punchier contrast
          const intensity = clamp01((wave*0.5+0.5));
          const bright = intensity*intensity;
          const c = cols[si];
          r += c[0]*bright;
          g += c[1]*bright;
          b += c[2]*bright;
        });

        // tone-map: sum can exceed 255
        const mx = Math.max(r,g,b);
        const sc = mx>220 ? 220/mx : 1;
        const i4=(y*BW+x)*4;
        dat[i4]=r*sc; dat[i4+1]=g*sc; dat[i4+2]=b*sc; dat[i4+3]=255;
      }
    }

    bctx.putImageData(img,0,0);
    ctx.drawImage(bc,0,0,W,H);
    t+=dt;
    rafId=requestAnimationFrame(frame);
  }
  frame();
}

// ─────────────────────────────────────────
// flow: particles in a vector field
// ─────────────────────────────────────────
function startFlow() {
  stopAll();
  const N = 2800;
  const TRAIL_ALPHA = 0.018; // fade each frame

  // Each particle: [x, y, vx, vy, colorIdx, life, maxLife, speed]
  const pts = new Float32Array(N*8);

  function spawnParticle(pi) {
    const base = pi*8;
    pts[base+0] = Math.random()*W;
    pts[base+1] = Math.random()*H;
    pts[base+2] = 0;
    pts[base+3] = 0;
    pts[base+4] = Math.floor(Math.random()*3); // color index
    pts[base+5] = 0;
    pts[base+6] = 180 + Math.random()*300; // life
    pts[base+7] = 0.6 + Math.random()*1.2; // speed
  }

  for (let i=0; i<N; i++) spawnParticle(i);

  let t = 0;

  function frame() {
    // Fade background
    ctx.fillStyle = `rgba(8,8,8,${TRAIL_ALPHA})`;
    ctx.fillRect(0,0,W,H);

    const [c1,c2,c3] = rgb();
    const cols = [c1,c2,c3];
    const hexCols = colors;

    for (let i=0; i<N; i++) {
      const base=i*8;
      let x=pts[base], y=pts[base+1];
      const ci=pts[base+4]|0;
      let life=pts[base+5];
      const maxLife=pts[base+6];
      const spd=pts[base+7];

      // Flow field angle: layered trig
      const nx = x/W, ny = y/H;
      const angle = Math.sin(nx*TAU*1.5 + t*0.4)*Math.cos(ny*TAU*1.2 + t*0.3)*TAU
                  + Math.sin(nx*TAU*0.7 - ny*TAU*0.9 + t*0.2)*1.5;

      // Each color index biases toward a different global drift direction
      const bias = (ci / 3) * TAU;
      const finalAngle = angle + bias * 0.25;

      pts[base+2] = Math.cos(finalAngle)*spd;
      pts[base+3] = Math.sin(finalAngle)*spd;

      x += pts[base+2];
      y += pts[base+3];

      // Wrap
      if (x<0) x=W; if (x>W) x=0;
      if (y<0) y=H; if (y>H) y=0;

      pts[base]=x; pts[base+1]=y; pts[base+5]=life+1;

      if (life >= maxLife) spawnParticle(i);

      const fadeIn = Math.min(life/30, 1);
      const fadeOut = Math.min((maxLife-life)/30, 1);
      const alpha = fadeIn * fadeOut * 0.85;

      const [r,g,b2] = cols[ci];
      ctx.fillStyle = `rgba(${r|0},${g|0},${b2|0},${alpha})`;
      ctx.fillRect(x|0, y|0, 1.5, 1.5);
    }

    t += 0.012;
    rafId=requestAnimationFrame(frame);
  }
  frame();
}

// ─────────────────────────────────────────
// signal: HSL encoded as oscilloscope waves
// ─────────────────────────────────────────
function startSignal() {
  stopAll();
  let t = 0;
  const dt = 0.018;

  // Scrolling buffer per color
  const HIST = Math.min(W, 900);
  const buffers = [new Float32Array(HIST), new Float32Array(HIST), new Float32Array(HIST)];
  let head = 0;

  function frame() {
    ctx.fillStyle = 'rgba(8,8,8,0.25)';
    ctx.fillRect(0,0,W,H);

    const rowH = H / 3;

    colors.forEach((hex, ci) => {
      const [r,g,b] = hexToRgb(hex);
      const [h,s,l] = rgbToHsl(r,g,b);

      // Encode HSL as waveform parameters
      const freq = 0.5 + (h/360)*3.5;    // hue → frequency
      const amp  = 0.3 + (s/100)*0.65;   // saturation → amplitude
      const base = -0.5 + (l/100);       // lightness → vertical position

      // Sample new value
      const val = base + amp * Math.sin(t * freq * TAU + ci * 2.1)
                       + (amp*0.3) * Math.sin(t * freq * TAU * 2.37 + ci)
                       + (amp*0.15) * Math.sin(t * freq * TAU * 0.5 - ci*1.3);

      buffers[ci][head % HIST] = val;

      const rowCenterY = rowH * ci + rowH * 0.5;
      const ampPx = rowH * 0.38;

      // Draw grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, rowH*ci); ctx.lineTo(W, rowH*ci);
      ctx.stroke();
      // Center line
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.beginPath();
      ctx.moveTo(0, rowCenterY); ctx.lineTo(W, rowCenterY);
      ctx.stroke();

      // Draw waveform
      ctx.strokeStyle = hex;
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 8;
      ctx.shadowColor = hex;
      ctx.beginPath();

      const startIdx = (head - HIST + 1 + HIST*2) % HIST;
      let first = true;
      for (let px=0; px<HIST; px++) {
        const idx = (startIdx + px) % HIST;
        const v = buffers[ci][idx];
        const x = (px / HIST) * W;
        const y = rowCenterY - v * ampPx;
        if (first) { ctx.moveTo(x, y); first=false; } else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Current value readout
      const [cr,cg,cb] = hexToRgb(hex);
      ctx.fillStyle = `rgba(${cr},${cg},${cb},0.5)`;
      ctx.font = '10px JetBrains Mono';
      ctx.fillText(`hsl(${h}, ${s}%, ${l}%)`, 16, rowH*ci + 18);

      // HSL param labels (right side)
      ctx.fillStyle = `rgba(${cr},${cg},${cb},0.25)`;
      ctx.fillText(`freq ${freq.toFixed(2)}  amp ${amp.toFixed(2)}`, W - 200, rowH*ci + 18);
    });

    head++;
    t += dt;
    rafId=requestAnimationFrame(frame);
  }
  frame();
}

// ─────────────────────────────────────────
// void: three glowing orbs with phosphor trails
// ─────────────────────────────────────────
function startVoid() {
  stopAll();
  ctx.fillStyle = '#080808';
  ctx.fillRect(0,0,W,H);
  let t = 0;
  const dt = 0.006;

  // Each orb: [orbit radius x, orbit radius y, orbital speed, phase offset x, phase offset y]
  const orbits = [
    { rx:0.22, ry:0.18, sx:0.41, sy:0.37, px:0,    py:0.5  },
    { rx:0.19, ry:0.25, sx:0.29, sy:0.43, px:2.1,  py:1.3  },
    { rx:0.25, ry:0.15, sx:0.37, sy:0.31, px:4.2,  py:3.1  },
  ];

  const baseRadius = Math.min(W, H) * 0.06;

  function frame() {
    // Very slow fade — creates long trails
    ctx.fillStyle = 'rgba(8,8,8,0.04)';
    ctx.fillRect(0,0,W,H);

    const [c1,c2,c3] = rgb();
    const cols = [c1,c2,c3];

    orbits.forEach((o,oi) => {
      const cx = W*0.5 + Math.cos(t*o.sx + o.px)*W*o.rx;
      const cy = H*0.5 + Math.sin(t*o.sy + o.py)*H*o.ry;
      const [r,g,b] = cols[oi];

      // breathing radius
      const breathe = 1 + 0.15*Math.sin(t*0.8 + oi*2.1);
      const rad = baseRadius * breathe;

      // Outer glow (large, very dim)
      const glo = ctx.createRadialGradient(cx,cy,0, cx,cy,rad*4);
      glo.addColorStop(0,   `rgba(${r|0},${g|0},${b|0},0.08)`);
      glo.addColorStop(1,   `rgba(${r|0},${g|0},${b|0},0)`);
      ctx.fillStyle = glo;
      ctx.beginPath(); ctx.arc(cx,cy,rad*4,0,TAU); ctx.fill();

      // Core glow
      const core = ctx.createRadialGradient(cx,cy,0, cx,cy,rad);
      core.addColorStop(0,   `rgba(${r|0},${g|0},${b|0},0.9)`);
      core.addColorStop(0.4, `rgba(${r|0},${g|0},${b|0},0.4)`);
      core.addColorStop(1,   `rgba(${r|0},${g|0},${b|0},0)`);
      ctx.fillStyle = core;
      ctx.beginPath(); ctx.arc(cx,cy,rad,0,TAU); ctx.fill();

      // Tiny hot center
      ctx.fillStyle = `rgba(255,255,255,0.7)`;
      ctx.beginPath(); ctx.arc(cx,cy,rad*0.06,0,TAU); ctx.fill();
    });

    t += dt;
    rafId=requestAnimationFrame(frame);
  }
  frame();
}

// ─────────────────────────────────────────
// terrain: animated noise field, 3-color
// ─────────────────────────────────────────
function startTerrain() {
  stopAll();
  const SCALE = 5;
  let t = 0;
  const dt = 0.008;

  function frame() {
    const [c1,c2,c3] = rgb();
    const BW = Math.ceil(W/SCALE);
    const BH = Math.ceil(H/SCALE);
    const { canvas:bc, ctx:bctx, img } = getPxBuf(BW, BH);
    const dat = img.data;

    for (let y=0; y<BH; y++) {
      for (let x=0; x<BW; x++) {
        const nx = x/BW, ny = y/BH;

        // layered trig noise (fake simplex)
        let n = 0;
        n += Math.sin(nx*TAU*2   + t*0.9 ) * Math.cos(ny*TAU*1.8 + t*0.7 ) * 0.50;
        n += Math.sin(nx*TAU*4.1 - t*1.3 ) * Math.cos(ny*TAU*3.7 + t     ) * 0.25;
        n += Math.sin(nx*TAU*8.3 + t*2.1 ) * Math.cos(ny*TAU*7.9 - t*1.7 ) * 0.12;
        n += Math.sin(nx*TAU*16  - t*3.3 ) * Math.cos(ny*TAU*15  + t*2.5 ) * 0.06;
        n += Math.sin(nx*TAU*1.3 + ny*TAU*1.7 + t*0.5) * 0.07;

        n = clamp01(n*0.5 + 0.5); // normalize to 0..1

        // Map value to color bands with smooth transitions
        let r,g,b;
        if (n < 0.45) {
          const u = n / 0.45;
          const soft = u*u*(3-2*u); // smoothstep
          [r,g,b] = lerpRgb(
            [c1[0]*0.12, c1[1]*0.12, c1[2]*0.12], // deep shadow of c1
            c1,
            soft
          );
        } else if (n < 0.7) {
          const u = (n-0.45)/0.25;
          const soft = u*u*(3-2*u);
          [r,g,b] = lerpRgb(c1, c2, soft);
        } else {
          const u = (n-0.7)/0.3;
          const soft = u*u*(3-2*u);
          [r,g,b] = lerpRgb(c2, c3, soft);
        }

        const i4=(y*BW+x)*4;
        dat[i4]=r|0; dat[i4+1]=g|0; dat[i4+2]=b|0; dat[i4+3]=255;
      }
    }

    bctx.putImageData(img,0,0);
    ctx.drawImage(bc,0,0,W,H);
    t+=dt;
    rafId=requestAnimationFrame(frame);
  }
  frame();
}

// ═══════════════════════════════════════════
// CHAPTER REGISTRY
// ═══════════════════════════════════════════
const chapters = [
  { id:'set',      label:'set',     desc:'identity · tap to pick',       fn: startSet      },
  { id:'field',    label:'field',   desc:'inverse-distance color field',  fn: startField    },
  { id:'wave',     label:'wave',    desc:'3-source interference',         fn: startWave     },
  { id:'flow',     label:'flow',    desc:'vector field particles',        fn: startFlow     },
  { id:'signal',   label:'signal',  desc:'hsl encoded as waveforms',      fn: startSignal   },
  { id:'terrain',  label:'terrain', desc:'layered noise · 3-color map',   fn: startTerrain  },
  { id:'void',     label:'void',    desc:'phosphor drift in darkness',    fn: startVoid     },
];

function startChapter(ch) {
  activeChapter = ch;
  ch.fn();

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === ch.id);
  });

  // Update label
  const idx = chapters.indexOf(ch);
  document.getElementById('cl-num').textContent = `0${idx+1} / ${String(idx+1).padStart(2,'0')} ${ch.label}`;
  document.getElementById('cl-desc').textContent = ch.desc;
}

// Build nav
const nav = document.getElementById('nav');
chapters.forEach(ch => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = ch.label;
  btn.dataset.id = ch.id;
  btn.addEventListener('click', () => startChapter(ch));
  nav.appendChild(btn);
});

// ═══════════════════════════════════════════
// COLOR INPUTS
// ═══════════════════════════════════════════
function updateColorUI() {
  [0,1,2].forEach(i => {
    const hex = colors[i];
    document.getElementById(`chip${i}`).style.background = hex;
    document.getElementById(`hex${i}`).value = hex;
    document.getElementById(`picker${i}`).value = hex;
  });
  // If on set chapter, refresh it
  if (activeChapter?.id === 'set') startSet();
}

function setColor(i, hex) {
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  colors[i] = hex;
  updateColorUI();
  // Most chapters read colors live from state, but set needs a full restart
}

[0,1,2].forEach(i => {
  const picker = document.getElementById(`picker${i}`);
  const hexIn  = document.getElementById(`hex${i}`);

  picker.addEventListener('input', () => setColor(i, picker.value));

  hexIn.addEventListener('input', () => {
    let v = hexIn.value.trim();
    if (!v.startsWith('#')) v = '#' + v;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) setColor(i, v);
  });
  hexIn.addEventListener('blur', () => { hexIn.value = colors[i]; });
});

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  const idx = activeChapter ? chapters.indexOf(activeChapter) : -1;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    const next = chapters[(idx+1) % chapters.length];
    startChapter(next);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    const prev = chapters[(idx-1+chapters.length) % chapters.length];
    startChapter(prev);
  } else if (e.key >= '1' && e.key <= '7') {
    const n = parseInt(e.key)-1;
    if (chapters[n]) startChapter(chapters[n]);
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
updateColorUI();
startChapter(chapters[0]);
</script>
