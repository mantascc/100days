<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sketch Theme</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header><span id="theme-name"></span><span id="chapter-name"></span></header>

    <nav class="toolbar">
        <button class="toolbar-btn disabled" id="btn-prev">←</button>
        <div class="toolbar-sep"></div>
        <span class="toolbar-label" id="chapter-counter">01 / 06</span>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" id="btn-next">→</button>
    </nav>

    <button id="btn-clone">THEMES</button>

    <div class="guide-popover" id="guide-popover">
        <p class="guide-title">SELECT THEME</p>
        <ul class="guide-steps" id="theme-list"></ul>
    </div>

    <script>
        const btnClone = document.getElementById('btn-clone');
        const popover = document.getElementById('guide-popover');
        btnClone.addEventListener('click', (e) => {
            e.stopPropagation();
            const open = popover.classList.toggle('is-open');
            btnClone.classList.toggle('active', open);
        });
        document.addEventListener('click', () => {
            popover.classList.remove('is-open');
            btnClone.classList.remove('active');
        });
        popover.addEventListener('click', (e) => e.stopPropagation());
    </script>

    <div class="grid" id="grid"></div>

    <script type="module" src="main.js"></script>
</body>

</html>
