<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>armature · soft-island ideas</title>
<style>
  /* light palette (default) */
  :root, :root[data-theme="light"] {
    --bg: #c4c8c2;
    --screen: #dadcd8;
    --elev1: #f2f2f0;
    --elev2: #ffffff;
    --stroke: #a8aba6;
    --muted: #5d6058;
    --fg: #2a2c28;
    --accent:    #cc785c;
    --ambient-1: #7a8ea6;
    --ambient-2: #8aa18a;
    --ambient-3: #c9a268;
  }

  /* dark palette — applies via OS preference unless overridden */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1f221e;
      --screen: #2a2d28;
      --elev1: #353833;
      --elev2: #45483f;
      --stroke: #5d6058;
      --muted: #9aa094;
      --fg: #e8e6dd;
      --accent:    #d68866;
      --ambient-1: #8a9eb4;
      --ambient-2: #9ab298;
      --ambient-3: #d4a878;
    }
  }

  /* explicit dark override (wins over media query) */
  :root[data-theme="dark"] {
    --bg: #1f221e;
    --screen: #2a2d28;
    --elev1: #353833;
    --elev2: #45483f;
    --stroke: #5d6058;
    --muted: #9aa094;
    --fg: #e8e6dd;
    --accent:    #d68866;
    --ambient-1: #8a9eb4;
    --ambient-2: #9ab298;
    --ambient-3: #d4a878;
  }
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    min-height: 100vh;
    font: 11px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px 96px;
    box-sizing: border-box;
  }
  .takes { width: 480px; position: relative; }
  .take {
    margin: 0;
    display: none;
    flex-direction: column;
    gap: 14px;
    align-items: flex-start;
  }
  .take--active { display: flex; }
  figcaption {
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: lowercase;
    font-size: 10px;
  }
  svg {
    display: block;
    width: 100%;
    height: auto;
    background: var(--screen);
    opacity: 0;
    animation: take-in 0.6s ease-out forwards;
  }
  @keyframes take-in { from { opacity: 0; } to { opacity: 1; } }

  /* theme toggle (fixed top-right) */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    background: var(--elev1);
    border: 1px solid var(--stroke);
    border-radius: 4px;
    color: var(--fg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    z-index: 10;
  }
  .theme-toggle:hover { background: var(--elev2); }
  .theme-toggle svg { width: 14px; height: 14px; display: block; }
  .theme-toggle .sun { display: none; }
  .theme-toggle .moon { display: block; }
  :root[data-theme="dark"] .theme-toggle .sun { display: block; }
  :root[data-theme="dark"] .theme-toggle .moon { display: none; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .theme-toggle .sun { display: block; }
    :root:not([data-theme="light"]) .theme-toggle .moon { display: none; }
  }

  /* breadcrumb */
  .breadcrumb {
    position: fixed;
    top: 16px;
    left: 16px;
    color: var(--muted);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: lowercase;
    padding: 6px 10px;
    background: var(--elev1);
    border: 1px solid var(--stroke);
    border-radius: 4px;
    z-index: 10;
  }
  .breadcrumb:hover { background: var(--elev2); color: var(--fg); }

  /* floating control bar */
  .controls {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    display: flex;
    align-items: stretch;
    background: var(--elev1);
    border: 1px solid var(--stroke);
    border-radius: 4px;
    overflow: hidden;
    height: 36px;
    user-select: none;
    z-index: 10;
  }
  .control {
    appearance: none;
    background: transparent;
    border: none;
    border-right: 1px solid var(--stroke);
    color: var(--fg);
    font: inherit;
    font-size: 14px;
    padding: 0 14px;
    cursor: pointer;
    line-height: 1;
  }
  .control:last-child { border-right: none; border-left: 1px solid var(--stroke); }
  .control:hover:not(:disabled) { background: var(--elev2); }
  .control:disabled { color: var(--muted); cursor: default; }
  .indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px;
  }
  .label {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: lowercase;
    min-width: 90px;
    text-align: center;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 6px; height: 6px; background: var(--muted); opacity: 0.4; }
  .dot.active { background: var(--accent); opacity: 1; }

  /* ============================================================
     ANIMATIONS
     ============================================================ */

  /* streaming text rows — chat bubbles, code lines.
     each row uses an inline animation-delay for stagger. */
  .stream-row, .code-line {
    opacity: 0;
    animation: stream-row 8s linear infinite;
  }
  @keyframes stream-row {
    0%        { opacity: 0; transform: translateY(-2px); }
    4%        { opacity: 1; transform: translateY(0); }
    88%       { opacity: 1; }
    96%, 100% { opacity: 0; }
  }

  /* T1 — agent workspace: 6px outer padding, 6px inter-panel gaps
     `backwards` fill-mode applies 0% keyframe values during the 0.8s delay,
     so the scene opens in the full-screen-chat state (artifact hidden). */
  .chat-panel {
    animation: chat-resize 9s ease-in-out 0.8s infinite backwards;
  }
  @keyframes chat-resize {
    0%, 14%   { width: 398px; }
    30%, 68%  { width: 248px; }
    84%, 100% { width: 398px; }
  }

  .artifact-panel {
    animation: artifact-slide 9s ease-in-out 0.8s infinite backwards;
  }
  @keyframes artifact-slide {
    0%, 14%   { transform: translateX(150px); opacity: 0; }
    30%, 68%  { transform: translateX(0);     opacity: 1; }
    84%, 100% { transform: translateX(150px); opacity: 0; }
  }

  /* chat content shifts to stay centered as the chat panel resizes
     panel width: 398 ↔ 248 (Δ=150); shift content by half (~75) to keep centered */
  .chat-content {
    animation: chat-content-shift 9s ease-in-out 0.8s infinite backwards;
  }
  @keyframes chat-content-shift {
    0%, 14%   { transform: translateX(75px); }
    30%, 68%  { transform: translateX(0); }
    84%, 100% { transform: translateX(75px); }
  }

  /* a small accent dot on the agent message — pulses just before artifact appears */
  .artifact-trigger {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0;
    animation: artifact-trigger 9s ease-in-out 0.8s infinite backwards;
  }
  @keyframes artifact-trigger {
    0%, 14%   { opacity: 0; transform: scale(1); }
    22%       { opacity: 1; transform: scale(1.6); }
    28%       { opacity: 1; transform: scale(1); }
    68%       { opacity: 1; transform: scale(1); }
    78%       { opacity: 0; }
    100%      { opacity: 0; }
  }
</style>
</head>
<body>

    <div class="label" id="label">t1 / 2</div>
  </div>
  <button class="control" id="next" aria-label="next take">→</button>
</nav>

<script>
  const takes = [...document.querySelectorAll('.take')];
  const dotsEl = document.getElementById('dots');
  const labelEl = document.getElementById('label');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  takes.forEach(() => {
    const d = document.createElement('span');
    d.className = 'dot';
    dotsEl.appendChild(d);
  });

  let active = 0;
  function show(i) {
    active = (i + takes.length) % takes.length;
    takes.forEach((s, idx) => s.classList.toggle('take--active', idx === active));
    [...dotsEl.children].forEach((d, idx) => d.classList.toggle('active', idx === active));
    labelEl.textContent = `t${active + 1} / ${takes.length}`;
    prevBtn.disabled = active === 0;
    nextBtn.disabled = active === takes.length - 1;
  }

  prevBtn.addEventListener('click', () => show(active - 1));
  nextBtn.addEventListener('click', () => show(active + 1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  show(active - 1);
    if (e.key === 'ArrowRight') show(active + 1);
  });

  show(0);

  // theme toggle — persists in localStorage, falls back to OS preference
  const themeToggle = document.getElementById('theme-toggle');
  const root = document.documentElement;

  function applyTheme(theme) {
    if (theme) root.setAttribute('data-theme', theme);
    else root.removeAttribute('data-theme');
  }

  const stored = localStorage.getItem('armature-theme');
  if (stored) applyTheme(stored);

  themeToggle.addEventListener('click', () => {
    const current = root.getAttribute('data-theme');
    const osDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    // determine effective current theme
    const effective = current || (osDark ? 'dark' : 'light');
    const next = effective === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('armature-theme', next);
  });
</script>
