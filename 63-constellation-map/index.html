                // inject extra projects into data
                EXTRA_PROJECTS.forEach(p => {
                    data.projects.push({ day: p.day, title: p.title, idea: p.idea, concepts: p.concepts });
                });
                initGraph();
                buildDayMap();

                document.getElementById('info').textContent = 'Settling…';
                for (let i = 0; i < 160; i++) simulate();
                document.getElementById('info').textContent = '100 Days';

                setTimeout(startTrail, 900);
                animate();
            })


        // ── graph init ─────────────────────────────────────────────────────────
        function initGraph() {
            const conceptPos = {};

            data.concepts.forEach((c, i) => {
                const angle  = (i / data.concepts.length) * Math.PI * 2 - Math.PI / 2;
                const radius = Math.min(canvas.width, canvas.height) * 0.21;
                const x = canvas.width  / 2 + Math.cos(angle) * radius;
                const y = canvas.height / 2 + Math.sin(angle) * radius;
                conceptPos[c.id] = { x, y };

                nodes.push({
                    id: `concept-${c.id}`, label: c.label,
                    x, y, vx: 0, vy: 0,
                    type: 'concept', color: c.color, radius: 8, data: c
                });
            });

            data.projects.forEach(p => {
                const cp    = conceptPos[p.concepts[0]];
                const angle = Math.random() * Math.PI * 2;
                const dist  = 70 + Math.random() * 60;
                nodes.push({
                    id: `project-${p.day}`,
                    label: String(p.day),
                    title: p.title, idea: p.idea,
                    x: cp.x + Math.cos(angle) * dist,
                    y: cp.y + Math.sin(angle) * dist,
                    vx: 0, vy: 0,
                    type: 'project', concepts: p.concepts,
                    radius: 3, data: p
                });

                p.concepts.forEach(cid => {
                    edges.push({ source: `project-${p.day}`, target: `concept-${cid}` });
                });
            });
        }

        function buildDayMap() {
            nodes.forEach(n => {
                if (n.type === 'project') dayMap[n.data.day] = n;
            });

            // ghost entries for missing / future days
            for (let day = 1; day <= 100; day++) {
                if (!dayMap[day]) {
                    const angle = (day / 100) * Math.PI * 2;
                    const r     = 160 + (day > 62 ? 60 + Math.random() * 80 : 40 + Math.random() * 60);
                    const g = {
                        day, isGhost: true,
                        x: canvas.width  / 2 + Math.cos(angle) * r,
                        y: canvas.height / 2 + Math.sin(angle) * r
                    };
                    ghostEntries.push(g);
                    dayMap[day] = g;
                }
            }
        }

        // ── trail ──────────────────────────────────────────────────────────────
        function startTrail() {
            trailProgress  = 0;
            trailAnimating = true;
            trailComplete  = false;
            dayCounter.style.opacity = '1';
        }

        replayBtn.addEventListener('click', startTrail);

        // colour along the temporal arc: indigo → teal → amber
        function trailColor(day, alpha) {
            const t = day / 100;
            let r, g, b;
            if (t < 0.5) {
                const s = t * 2;
                r = Math.round(80  + s * 20);
                g = Math.round(100 + s * 100);
                b = Math.round(220 - s * 60);
            } else {
                const s = (t - 0.5) * 2;
                r = Math.round(100 + s * 155);
                g = Math.round(200 - s * 60);
                b = Math.round(160 - s * 110);
            }
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // ── physics ────────────────────────────────────────────────────────────
        function getDamping() {
            if (simulationStep < 200) return 0.70 + 0.22 * (simulationStep / 200);
            return 0.92;
        }

        function nodeById(id) { return nodes.find(n => n.id === id); }

        function simulate() {
            simulationStep++;
            const d = getDamping();

            edges.forEach(e => {
                const s = nodeById(e.source), t = nodeById(e.target);
                if (!s || !t) return;
                const dx = t.x - s.x, dy = t.y - s.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                const f = (dist - SPRING_LENGTH) * SPRING_STRENGTH;
                s.vx += dx/dist*f; s.vy += dy/dist*f;
                t.vx -= dx/dist*f; t.vy -= dy/dist*f;
            });

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i+1; j < nodes.length; j++) {
                    const a = nodes[i], b = nodes[j];
                    const dx = b.x-a.x, dy = b.y-a.y;
                    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
                    const m = (a.type==='project'&&b.type==='project') ? 0.3 : 1;
                    const f = REPULSION * m / (dist*dist);
                    a.vx -= dx/dist*f; a.vy -= dy/dist*f;
                    b.vx += dx/dist*f; b.vy += dy/dist*f;
                }
            }

            nodes.forEach(n => {
                if (n.type === 'concept') {
                    n.vx += (canvas.width/2  - n.x) * CENTER_STRENGTH * 3;
                    n.vy += (canvas.height/2 - n.y) * CENTER_STRENGTH * 3;
                }
                if (n !== draggedNode) {
                    n.vx *= d; n.vy *= d;
                    n.x  += n.vx; n.y += n.vy;
                    const m = 50;
                    n.x = Math.max(m, Math.min(canvas.width -m, n.x));
                    n.y = Math.max(m, Math.min(canvas.height-m, n.y));
                }
            });
        }

        // ── render ─────────────────────────────────────────────────────────────
        function render() {
            ctx.fillStyle = '#070710';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // subtle background star-dust
            ctx.fillStyle = 'rgba(255,255,255,0.018)';
            // (pre-seeded static stars drawn once into offscreen — skip for simplicity)

            // ── concept → project edges ──
            ctx.strokeStyle = '#10101e';
            ctx.lineWidth = 1;
            edges.forEach(e => {
                const s = nodeById(e.source), t = nodeById(e.target);
                if (!s||!t) return;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(t.x, t.y);
                ctx.stroke();
            });

            // highlight hovered concept connections
            if (hoveredNode && hoveredNode.type === 'concept') {
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 1;
                edges.forEach(e => {
                    if (e.target !== hoveredNode.id) return;
                    const s = nodeById(e.source);
                    if (!s) return;
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y);
                    ctx.lineTo(hoveredNode.x, hoveredNode.y);
                    ctx.stroke();
                });
            }
            if (hoveredNode && hoveredNode.type === 'project') {
                ctx.strokeStyle = 'rgba(255,255,255,0.18)';
                ctx.lineWidth = 1;
                hoveredNode.concepts.forEach(cid => {
                    const t = nodeById(`concept-${cid}`);
                    if (!t) return;
                    ctx.beginPath();
                    ctx.moveTo(hoveredNode.x, hoveredNode.y);
                    ctx.lineTo(t.x, t.y);
                    ctx.stroke();
                });
            }

            // ── temporal trail ──
            const maxDay = trailAnimating ? trailProgress : (trailComplete ? 100 : 0);

            if (maxDay > 0) {
                let prev = null;
                for (let day = 1; day <= Math.floor(maxDay); day++) {
                    const cur = dayMap[day];
                    if (!cur) continue;
                    if (prev) {
                        const bothReal = !prev.isGhost && !cur.isGhost;
                        const alpha    = bothReal ? 0.28 : 0.07;
                        ctx.strokeStyle = trailColor(day, alpha);
                        ctx.lineWidth   = bothReal ? 1 : 0.5;
                        ctx.setLineDash(bothReal ? [] : [3, 7]);
                        ctx.beginPath();
                        ctx.moveTo(prev.x, prev.y);
                        ctx.lineTo(cur.x,  cur.y);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                    prev = cur;
                }

                // animated pulse on current day
                if (trailAnimating) {
                    const curDay  = Math.max(1, Math.floor(trailProgress));
                    const curNode = dayMap[curDay];
                    if (curNode && !curNode.isGhost) {
                        const frac = trailProgress % 1;
                        const glow = ctx.createRadialGradient(
                            curNode.x, curNode.y, 0,
                            curNode.x, curNode.y, 18
                        );
                        glow.addColorStop(0,   trailColor(curDay, 0.5));
                        glow.addColorStop(1,   'transparent');
                        ctx.fillStyle = glow;
                        ctx.beginPath();
                        ctx.arc(curNode.x, curNode.y, 18, 0, Math.PI*2);
                        ctx.fill();

                        // hard dot
                        ctx.fillStyle = trailColor(curDay, 0.9);
                        ctx.beginPath();
                        ctx.arc(curNode.x, curNode.y, 4 + 2*Math.sin(frac*Math.PI), 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }

            // ── ghost nodes ──
            ghostEntries.forEach(g => {
                if (g.day > Math.floor(maxDay)) return;
                const isHov = g === hoveredNode;
                ctx.fillStyle = isHov ? 'rgba(120,120,160,0.5)' : 'rgba(80,80,110,0.15)';
                ctx.beginPath();
                ctx.arc(g.x, g.y, isHov ? 3 : 1.5, 0, Math.PI*2);
                ctx.fill();
            });

            // ── concept nodes ──
            nodes.forEach(n => {
                if (n.type !== 'concept') return;
                const isHov = n === hoveredNode;
                if (isHov) {
                    const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 28);
                    glow.addColorStop(0, n.color + '44');
                    glow.addColorStop(1, 'transparent');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 28, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = isHov ? n.color : n.color + 'aa';
                ctx.beginPath();
                ctx.arc(n.x, n.y, isHov ? 10 : 8, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = '#444';
                ctx.font = '10px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(n.label, n.x, n.y - 14);
            });

            // ── project nodes ──
            nodes.forEach(n => {
                if (n.type !== 'project') return;
                // only reveal once trail reaches this day
                if (trailAnimating && n.data.day > Math.floor(trailProgress)) return;

                const isHov  = n === hoveredNode;
                const isCon  = hoveredNode?.type === 'concept' && n.concepts.includes(hoveredNode.data?.id);
                const isActive = isHov || isCon;

                if (isActive) {
                    // subtle glow
                    const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 10);
                    glow.addColorStop(0, 'rgba(255,255,255,0.15)');
                    glow.addColorStop(1, 'transparent');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 10, 0, Math.PI*2);
                    ctx.fill();
                }

                ctx.fillStyle = isActive ? '#ddd' : '#444';
                ctx.beginPath();
                ctx.arc(n.x, n.y, isHov ? 4.5 : 2.5, 0, Math.PI*2);
                ctx.fill();

                if (isHov) {
                    ctx.fillStyle = '#555';
                    ctx.font = '9px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${n.data.day}`, n.x, n.y + 14);
                }
            });
        }

        // ── update trail + counter ─────────────────────────────────────────────
        function updateTrail() {
            if (!trailAnimating) return;
            trailProgress += TRAIL_SPEED;

            const cur = dayMap[Math.floor(trailProgress)];
            if (cur) {
                dayNum.textContent   = `Day ${Math.floor(trailProgress)}`;
                dayTitle.textContent = cur.isGhost ? '—' : (cur.title || cur.data?.title || '');
            }

            if (trailProgress >= 100) {
                trailProgress  = 100;
                trailAnimating = false;
                trailComplete  = true;
                dayCounter.style.opacity = '0';
            }
        }

        // ── animation loop ─────────────────────────────────────────────────────
        function animate() {
            simulate();
            updateTrail();
            render();
            requestAnimationFrame(animate);
        }

        // ── mouse ──────────────────────────────────────────────────────────────
        canvas.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            hoveredNode = null;
            const allNodes = [...nodes, ...ghostEntries];
            for (const n of allNodes) {
                const dx   = mouse.x - n.x;
                const dy   = mouse.y - n.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const hit  = n.type === 'concept' ? 14 : n.isGhost ? 8 : 10;
                if (dist < hit) { hoveredNode = n; break; }
            }

            if (hoveredNode) {
                tooltip.style.opacity = '1';
                tooltip.style.left    = mouse.x + 16 + 'px';
                tooltip.style.top     = mouse.y + 16 + 'px';

                if (hoveredNode.type === 'concept') {
                    const count = data.groups?.[hoveredNode.data.id]?.projects?.length ?? '—';
                    tooltip.innerHTML = `
                        <div class="title">${hoveredNode.label}</div>
                        <div class="idea">${count} projects</div>`;
                } else if (hoveredNode.isGhost) {
                    tooltip.innerHTML = `
                        <div class="title">Day ${hoveredNode.day}</div>
                        <div class="ghost-label">not yet</div>`;
                } else {
                    const d = hoveredNode.data;
                    tooltip.innerHTML = `
                        <div class="title">Day ${d.day}: ${hoveredNode.title || d.title}</div>
                        <div class="idea">${hoveredNode.idea || d.idea}</div>
                        <div class="nav">click to open →</div>`;
                }
            } else {
                tooltip.style.opacity = '0';
            }

            if (draggedNode && !draggedNode.isGhost) {
                draggedNode.x  = mouse.x;
                draggedNode.y  = mouse.y;
                draggedNode.vx = 0;
                draggedNode.vy = 0;
            }

            canvas.style.cursor =
                hoveredNode?.type === 'project' ? 'pointer' :
                hoveredNode ? 'grab' : 'default';
        });

        canvas.addEventListener('mousedown', () => {
            if (hoveredNode) draggedNode = hoveredNode;
        });
        canvas.addEventListener('mouseup', () => { draggedNode = null; });

        canvas.addEventListener('click', () => {
            if (hoveredNode?.type === 'project') {
                const folder = DAY_FOLDERS[hoveredNode.data.day];
                if (folder) window.location.href = `../${folder}/index.html`;
            }
        });

        window.addEventListener('resize', () => {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
