<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viz sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --ground-void: #0a0a0a;
    --ground-base: #111111;
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.45);
    --text-ghost: rgba(255,255,255,0.25);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --font: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--ground-void);
    color: var(--text-primary);
    padding: 2rem;
    min-height: 100vh;
  }

  h1 {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-ghost);
    margin-bottom: 2rem;
  }

  .gallery { max-width: 1100px; margin: 0 auto; }

  .goal-section { margin-bottom: 3rem; }

  .goal-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 0.5px solid var(--border);
  }

  .goal-label {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-ghost);
    min-width: 80px;
  }

  .goal-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .goal-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-left: auto;
  }

  .variants {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }

  .variant-tag {
    font-size: 10px;
    font-family: var(--font);
    padding: 3px 8px;
    border-radius: 3px;
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    cursor: default;
    transition: border-color 0.15s, color 0.15s;
  }

  .variant-tag:hover {
    border-color: var(--border-hover);
    color: var(--text-primary);
  }

  .charts-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .chart-card {
    background: var(--ground-base);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 12px;
  }

  .chart-name {
    font-size: 10px;
    color: var(--text-ghost);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .chart-canvas-wrap {
    position: relative;
    width: 100%;
    height: 90px;
  }

  .chart-canvas-wrap canvas { display: block; }

  .best-for {
    font-size: 10px;
    color: var(--text-ghost);
    margin-top: 6px;
  }

  .meta {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-ghost);
    display: flex;
    gap: 16px;
  }

  .meta span:last-child { opacity: 0.5; }

  .accent-compare   { border-left: none; }
  .accent-distribute{ border-left: none; }
  .accent-trend     { border-left: none; }
  .accent-compose   { border-left: none; }
  .accent-relate    { border-left: none; }
  .accent-locate    { border-left: none; }

  .sheet-nav {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2rem;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }
  .sheet-nav h1 {
    margin-bottom: 0;
  }
  .sheet-links {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex;
    gap: 16px;
  }
  .sheet-links a {
    color: var(--text-ghost);
    text-decoration: none;
    transition: color 0.15s;
    padding-bottom: 4px;
    border-bottom: 1px solid transparent;
  }
  .sheet-links a:hover {
    color: var(--text-secondary);
  }
  .sheet-links .active {
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-hover);
    padding-bottom: 4px;
  }


  @media (max-width: 700px) {
    .charts-row { grid-template-columns: 1fr; }
    body { padding: 1rem; }
  }
</style>
</head>
<body>

<nav class="sheet-nav">
  <h1>Viz sheet</h1>
  <div class="sheet-links" style="display: none;">
    <span class="active">Sheet 1: Core</span>
    <a href="sheet2.html">Sheet 2: Semantic</a>
  </div>
</nav>

<div class="gallery" id="app"></div>

<script>
// ── Chart.js global defaults ─────────────────────────────────────────────────
Chart.defaults.font.family = "'IBM Plex Mono', monospace";
Chart.defaults.font.size   = 10;
Chart.defaults.color       = 'rgba(255,255,255,0.35)';
Chart.defaults.plugins.legend.display = false;

// ── Shared scale helpers ─────────────────────────────────────────────────────
const xScale = (stacked = false, showGrid = false) => ({
  stacked,
  grid: { display: showGrid, color: 'rgba(255,255,255,0.05)' }
});
const yScale = (stacked = false) => ({
  stacked,
  grid: { color: 'rgba(255,255,255,0.05)' }
});
const xyScales = (opts = {}) => ({
  x: xScale(opts.stackedX, opts.xGrid),
  y: yScale(opts.stackedY)
});
const baseOpts = (extra = {}) => ({
  responsive: true,
  maintainAspectRatio: false,
  ...extra
});

// ── Goals data ───────────────────────────────────────────────────────────────
const goals = [
  {
    id: 'compare', title: 'Compare', desc: 'how things differ', accentClass: 'accent-compare',
    variants: ['compare 2', 'compare many', 'rank', 'deviation from baseline'],
    dataContract: { required: ['category', 'value'], optional: ['group', 'baseline'] },
    components: [
      {
        name: 'Bar chart', bestFor: 'compare many, rank',
        render: canvas => new Chart(canvas, {
          type: 'bar',
          data: { labels: ['A','B','C','D','E'], datasets: [{ data: [84,62,91,47,73], backgroundColor: '#7b6fa5', borderRadius: 2 }] },
          options: baseOpts({ scales: xyScales() })
        })
      },
      {
        name: 'Grouped bar', bestFor: 'compare 2 groups across categories',
        render: canvas => new Chart(canvas, {
          type: 'bar',
          data: {
            labels: ['Q1','Q2','Q3','Q4'],
            datasets: [
              { data: [65,72,81,68], backgroundColor: '#7b6fa5', borderRadius: 2, barPercentage: 0.4 },
              { data: [45,58,62,79], backgroundColor: '#f4bfa0', borderRadius: 2, barPercentage: 0.4 }
            ]
          },
          options: baseOpts({ scales: xyScales() })
        })
      },
      {
        name: 'Diverging bar', bestFor: 'deviation from baseline',
        render: canvas => {
          const baseline = 60;
          const vals = [84,42,91,55,73,38];
          new Chart(canvas, {
            type: 'bar',
            data: {
              labels: ['A','B','C','D','E','F'],
              datasets: [{ data: vals.map(v => v - baseline), backgroundColor: vals.map(v => v >= baseline ? '#7b6fa5' : '#f4bfa0'), borderRadius: 2 }]
            },
            options: baseOpts({ scales: xyScales() })
          });
        }
      }
    ]
  },
  {
    id: 'distribute', title: 'Distribute', desc: 'how values spread', accentClass: 'accent-distribute',
    variants: ['distribution', 'outliers', 'skew', 'density'],
    dataContract: { required: ['value'], optional: ['category', 'bin'] },
    components: [
      {
        name: 'Histogram', bestFor: 'distribution, skew',
        render: canvas => new Chart(canvas, {
          type: 'bar',
          data: { labels: ['10','20','30','40','50','60','70','80','90'], datasets: [{ data: [3,8,15,28,22,14,7,2,1], backgroundColor: '#f4d87a', borderRadius: 2, categoryPercentage: 1, barPercentage: 0.95 }] },
          options: baseOpts({ scales: xyScales() })
        })
      },
      {
        name: 'Box plot', bestFor: 'outliers, quartiles',
        render: canvas => {
          const ctx = canvas.getContext('2d');
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = 90;
          const W = canvas.width, H = 90;
          const sc  = v => (v / 100) * (W - 40) + 20;
          const y   = H / 2, bh = 22;
          const stroke = 'rgba(255,255,255,0.4)';

          ctx.strokeStyle = stroke; ctx.lineWidth = 1;
          // whiskers
          [[10,25],[75,92]].forEach(([a,b]) => { ctx.beginPath(); ctx.moveTo(sc(a),y); ctx.lineTo(sc(b),y); ctx.stroke(); });
          // caps
          [10,92].forEach(x => { ctx.beginPath(); ctx.moveTo(sc(x),y-6); ctx.lineTo(sc(x),y+6); ctx.stroke(); });
          // box
          ctx.fillStyle = '#f4d87a'; ctx.globalAlpha = 0.5;
          ctx.fillRect(sc(25), y-bh/2, sc(75)-sc(25), bh);
          ctx.globalAlpha = 1;
          ctx.strokeRect(sc(25), y-bh/2, sc(75)-sc(25), bh);
          // median
          ctx.beginPath(); ctx.moveTo(sc(55),y-bh/2); ctx.lineTo(sc(55),y+bh/2); ctx.stroke();
          // outlier
          ctx.fillStyle = '#f07060'; ctx.beginPath(); ctx.arc(sc(97), y, 3, 0, Math.PI*2); ctx.fill();
          // labels
          ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = "9px 'IBM Plex Mono', monospace";
          [['Q1',sc(25)-4],['med',sc(51)],['Q3',sc(73)]].forEach(([label,x]) => ctx.fillText(label, x, y+bh/2+12));
        }
      },
      {
        name: 'Strip plot', bestFor: 'density, small n',
        render: canvas => {
          const ctx = canvas.getContext('2d');
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = 90;
          const W = canvas.width;
          [12,18,22,25,28,31,32,34,35,36,38,39,41,42,44,48,52,55,61,68,75,82].forEach(v => {
            ctx.fillStyle = '#f4d87a'; ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc((v/100)*(W-40)+20, 35 + (Math.random()*20-10), 3, 0, Math.PI*2);
            ctx.fill();
          });
          ctx.globalAlpha = 1;
          ctx.strokeStyle = 'rgba(255,255,255,0.1)';
          ctx.beginPath(); ctx.moveTo(20,58); ctx.lineTo(W-20,58); ctx.stroke();
        }
      }
    ]
  },
  {
    id: 'trend', title: 'Trend', desc: 'how things change', accentClass: 'accent-trend',
    variants: ['over time', 'rate of change', 'acceleration', 'seasonality'],
    dataContract: { required: ['time', 'value'], optional: ['series', 'event'] },
    components: [
      {
        name: 'Line chart', bestFor: 'trend over time',
        render: canvas => new Chart(canvas, {
          type: 'line',
          data: { labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'], datasets: [{ data: [30,42,38,55,48,67,72,81], borderColor: '#f4bfa0', backgroundColor: 'rgba(244,191,160,0.1)', tension: 0.4, pointRadius: 3, fill: true }] },
          options: baseOpts({ scales: xyScales() })
        })
      },
      {
        name: 'Multi-series line', bestFor: 'compare trends, seasonality',
        render: canvas => new Chart(canvas, {
          type: 'line',
          data: {
            labels: ['Jan','Mar','May','Jul','Sep','Nov'],
            datasets: [
              { data: [30,45,52,67,58,71], borderColor: '#f4bfa0', tension: 0.4, pointRadius: 2, fill: false },
              { data: [22,31,38,42,51,48], borderColor: 'rgba(244,191,160,0.5)', tension: 0.4, pointRadius: 2, fill: false, borderDash: [4,3] }
            ]
          },
          options: baseOpts({ scales: xyScales() })
        })
      },
      {
        name: 'Area chart', bestFor: 'cumulative, stacked trend',
        render: canvas => new Chart(canvas, {
          type: 'line',
          data: {
            labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul'],
            datasets: [
              { data: [20,28,35,32,42,51,48], borderColor: '#f4bfa0', backgroundColor: 'rgba(244,191,160,0.25)', tension: 0.4, pointRadius: 0, fill: true },
              { data: [10,14,18,15,22,28,24], borderColor: 'rgba(244,191,160,0.4)', backgroundColor: 'rgba(244,191,160,0.15)', tension: 0.4, pointRadius: 0, fill: true }
            ]
          },
          options: baseOpts({ scales: xyScales() })
        })
      }
    ]
  },
  {
    id: 'compose', title: 'Compose', desc: 'how parts make a whole', accentClass: 'accent-compose',
    variants: ['proportion', 'hierarchy', 'flow between categories'],
    dataContract: { required: ['category', 'value'], optional: ['parent', 'source', 'target'] },
    components: [
      {
        name: 'Donut chart', bestFor: 'proportion, part-to-whole',
        render: canvas => new Chart(canvas, {
          type: 'doughnut',
          data: { labels: ['A','B','C','D'], datasets: [{ data: [44,28,18,10], backgroundColor: ['#f4a0a0','#f4bfa0','#f07060','rgba(240,112,96,0.6)'], borderWidth: 0 }] },
          options: baseOpts({ cutout: '65%' })
        })
      },
      {
        name: 'Stacked bar', bestFor: 'composition over categories',
        render: canvas => new Chart(canvas, {
          type: 'bar',
          data: {
            labels: ['2021','2022','2023','2024'],
            datasets: [
              { data: [40,45,38,52], backgroundColor: '#f4a0a0' },
              { data: [30,28,35,25], backgroundColor: '#f07060' },
              { data: [20,18,22,15], backgroundColor: 'rgba(240,112,96,0.6)' }
            ]
          },
          options: baseOpts({ scales: xyScales({ stackedX: true, stackedY: true }) })
        })
      },
      {
        name: 'Treemap (simulated)', bestFor: 'hierarchy, nested proportion',
        render: canvas => {
          const ctx = canvas.getContext('2d');
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = 90;
          const W = canvas.width - 2, H = 88;
          const colors = ['#f07060','#f4a0a0','#f4bfa0','rgba(240,112,96,0.6)','#f4a0a0','#f07060'];
          [
            {x:0,   y:0,   w:0.45,h:0.6},
            {x:0.45,y:0,   w:0.3, h:0.6},
            {x:0.75,y:0,   w:0.25,h:0.6},
            {x:0,   y:0.6, w:0.35,h:0.4},
            {x:0.35,y:0.6, w:0.4, h:0.4},
            {x:0.75,y:0.6, w:0.25,h:0.4}
          ].forEach((r,i) => {
            ctx.fillStyle = colors[i];
            ctx.fillRect(r.x*W+1, r.y*H+1, r.w*W-2, r.h*H-2);
          });
        }
      }
    ]
  },
  {
    id: 'relate', title: 'Relate', desc: 'how things connect', accentClass: 'accent-relate',
    variants: ['correlation', 'cluster', 'network', 'spatial'],
    dataContract: { required: ['x', 'y'], optional: ['size', 'category', 'source', 'target'] },
    components: [
      {
        name: 'Scatter plot', bestFor: 'correlation',
        render: canvas => {
          const pts = Array.from({length:30}, () => { const x = Math.random()*80+10; return {x, y: x*0.6 + Math.random()*25 - 5}; });
          new Chart(canvas, {
            type: 'scatter',
            data: { datasets: [{ data: pts, backgroundColor: 'rgba(242,136,128,0.5)', pointRadius: 4, pointBorderWidth: 0 }] },
            options: baseOpts({ scales: xyScales({ xGrid: true }) })
          });
        }
      },
      {
        name: 'Bubble chart', bestFor: 'correlation + size encoding',
        render: canvas => new Chart(canvas, {
          type: 'bubble',
          data: { datasets: [{ data: [{x:20,y:30,r:8},{x:45,y:55,r:14},{x:70,y:40,r:6},{x:30,y:70,r:18},{x:60,y:80,r:10},{x:80,y:20,r:12},{x:15,y:50,r:5},{x:55,y:30,r:9}], backgroundColor: 'rgba(242,136,128,0.35)', borderColor: '#f28880', borderWidth: 1 }] },
          options: baseOpts({ scales: { x: { min:0, max:100, ...xScale(false,true) }, y: { min:0, max:100, ...yScale() } } })
        })
      },
      {
        name: 'Network (simulated)', bestFor: 'connections, dependencies',
        render: canvas => {
          const ctx = canvas.getContext('2d');
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = 90;
          const W = canvas.width, H = 90;
          const nodes = [{x:0.5,y:0.5,r:8},{x:0.2,y:0.25,r:5},{x:0.8,y:0.2,r:5},{x:0.15,y:0.7,r:5},{x:0.75,y:0.75,r:5},{x:0.5,y:0.15,r:4}];
          const edges = [[0,1],[0,2],[0,3],[0,4],[1,3],[2,5],[0,5]];
          ctx.strokeStyle = 'rgba(242,136,128,0.2)'; ctx.lineWidth = 1;
          edges.forEach(([a,b]) => {
            ctx.beginPath();
            ctx.moveTo(nodes[a].x*W, nodes[a].y*H);
            ctx.lineTo(nodes[b].x*W, nodes[b].y*H);
            ctx.stroke();
          });
          nodes.forEach((n,i) => {
            ctx.fillStyle = i === 0 ? '#f28880' : 'rgba(242,136,128,0.45)';
            ctx.beginPath(); ctx.arc(n.x*W, n.y*H, n.r, 0, Math.PI*2); ctx.fill();
          });
        }
      }
    ]
  },
  {
    id: 'locate', title: 'Locate', desc: 'where things are', accentClass: 'accent-locate',
    variants: ['geographic', 'positional', 'proximity'],
    dataContract: { required: ['lat/lng OR x/y'], optional: ['value', 'category', 'label'] },
    components: [
      {
        name: 'Dot map (simulated)', bestFor: 'geographic distribution',
        render: canvas => {
          const ctx = canvas.getContext('2d');
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = 90;
          ctx.fillStyle = 'rgba(255,255,255,0.02)'; ctx.fillRect(0,0,canvas.width,90);
          [{cx:0.3,cy:0.4,n:12},{cx:0.65,cy:0.3,n:8},{cx:0.5,cy:0.65,n:6},{cx:0.8,cy:0.6,n:4}].forEach(c => {
            for (let i = 0; i < c.n; i++) {
              ctx.fillStyle = 'rgba(240,112,96,0.6)';
              ctx.beginPath();
              ctx.arc(c.cx*canvas.width + (Math.random()-0.5)*60, c.cy*90 + (Math.random()-0.5)*40, 2.5, 0, Math.PI*2);
              ctx.fill();
            }
          });
        }
      },
      {
        name: 'Heatmap grid', bestFor: 'density, intensity by position',
        render: canvas => {
          const ctx = canvas.getContext('2d');
          canvas.width = canvas.parentElement.offsetWidth;
          canvas.height = 90;
          const cols = 10, rows = 5, cw = canvas.width/cols, ch = 90/rows;
          Array.from({length: rows*cols}, () => Math.random()).forEach((v, i) => {
            ctx.fillStyle = `rgba(240,112,96,${v*0.8+0.05})`;
            ctx.fillRect((i%cols)*cw+0.5, Math.floor(i/cols)*ch+0.5, cw-1, ch-1);
          });
        }
      },
      {
        name: 'Proximity scatter', bestFor: 'relative position, clusters',
        render: canvas => {
          const pts = [
            ...Array.from({length:8}, () => ({x:0.25+Math.random()*0.15, y:0.35+Math.random()*0.2, cat:0})),
            ...Array.from({length:7}, () => ({x:0.6 +Math.random()*0.2,  y:0.25+Math.random()*0.2, cat:1})),
            ...Array.from({length:6}, () => ({x:0.45+Math.random()*0.15, y:0.65+Math.random()*0.2, cat:2}))
          ];
          new Chart(canvas, {
            type: 'scatter',
            data: { datasets: [0,1,2].map(cat => ({
              data: pts.filter(p => p.cat === cat).map(p => ({x:p.x*100, y:p.y*100})),
              backgroundColor: ['rgba(240,112,96,0.7)','rgba(242,136,128,0.7)','rgba(244,160,160,0.7)'][cat],
              pointRadius: 4, pointBorderWidth: 0
            })) },
            options: baseOpts({ scales: {
              x: { min:0, max:100, ...xScale(false,true) },
              y: { min:0, max:100, ...yScale(), ticks: { display: false } }
            }})
          });
        }
      }
    ]
  }
];

// ── Render ───────────────────────────────────────────────────────────────────
function buildGallery() {
  const app = document.getElementById('app');

  goals.forEach(goal => {
    const section = document.createElement('div');
    section.className = 'goal-section';

    const header = document.createElement('div');
    header.className = 'goal-header';
    header.innerHTML = `
      <span class="goal-label">${goal.id}</span>
      <span class="goal-title">${goal.title}</span>
      <span class="goal-desc">${goal.desc}</span>
    `;

    const variants = document.createElement('div');
    variants.className = 'variants';
    variants.innerHTML = goal.variants.map(v => `<span class="variant-tag">${v}</span>`).join('');

    const chartsRow = document.createElement('div');
    chartsRow.className = 'charts-row';

    goal.components.forEach(comp => {
      const card    = document.createElement('div');
      card.className = `chart-card ${goal.accentClass}`;

      const name    = document.createElement('div');
      name.className = 'chart-name';
      name.textContent = comp.name;

      const wrap    = document.createElement('div');
      wrap.className = 'chart-canvas-wrap';
      const canvas  = document.createElement('canvas');
      wrap.appendChild(canvas);

      const bestFor = document.createElement('div');
      bestFor.className = 'best-for';
      bestFor.textContent = comp.bestFor;

      card.append(name, wrap, bestFor);
      chartsRow.appendChild(card);
      setTimeout(() => comp.render(canvas), 150);
    });

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<span>requires: ${goal.dataContract.required.join(', ')}</span><span>optional: ${goal.dataContract.optional.join(', ')}</span>`;

    section.append(header, variants, chartsRow, meta);
    app.appendChild(section);
  });
}

buildGallery();
</script>
</body>
</html>
