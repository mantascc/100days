<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 67: Audio Reactive ASCII Field</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #0a0a0a; overflow: hidden; height: 100%; font-family: 'IBM Plex Mono', monospace; }

    canvas { position: fixed; inset: 0; }

    /* ── MIC BUTTON ── */
    #mic-btn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: none; border: 0.5px solid #2e2848;
      color: #7b6fa5; font-family: inherit;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 12px 24px; cursor: pointer; transition: all 0.3s; z-index: 20;
    }
    #mic-btn:hover { border-color: #7b6fa5; color: #9d91b0; }
    #mic-btn.hidden { opacity: 0; pointer-events: none; }

    /* ── CONTROL BAR ── */
    #bar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: stretch;
      background: #0f0f0f; border: 0.5px solid #1e1e2e;
      border-radius: 4px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      z-index: 20; opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    #bar.visible { opacity: 1; pointer-events: all; }

    .bar-btn {
      background: none; border: none; border-right: 0.5px solid #1e1e2e;
      color: #3a3458; font-family: inherit; font-size: 13px;
      padding: 8px 14px; cursor: pointer; transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .bar-btn:last-child { border-right: none; border-left: 0.5px solid #1e1e2e; }
    .bar-btn:hover { color: #9d91b0; background: #141420; }

    #bar-center {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; min-width: 220px; justify-content: center;
    }

    #vocab-name {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: #7b6fa5; white-space: nowrap;
    }

    #meter {
      width: 36px; height: 1px; background: #1a1628; position: relative; flex-shrink: 0;
    }
    #meter-fill {
      position: absolute; inset: 0; background: #7b6fa5; width: 0%;
    }

    .bar-sep { width: 0.5px; background: #1e1e2e; flex-shrink: 0; }

    #settings-btn {
      background: none; border: none; border-left: 0.5px solid #1e1e2e;
      color: #3a3458; font-family: inherit; font-size: 10px; letter-spacing: 0.15em;
      padding: 8px 14px; cursor: pointer; transition: color 0.15s, background 0.15s;
      text-transform: uppercase;
    }
    #settings-btn:hover { color: #9d91b0; background: #141420; }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    #modal-overlay.visible { opacity: 1; pointer-events: all; }

    #modal {
      background: #0f0f0f; border: 0.5px solid #1e1e2e;
      width: 360px; border-radius: 4px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
    }

    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 0.5px solid #1e1e2e;
    }
    .modal-title {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #7b6fa5;
    }
    .modal-close {
      background: none; border: none; color: #3a3458; font-size: 14px;
      cursor: pointer; font-family: inherit; line-height: 1; padding: 0 2px;
    }
    .modal-close:hover { color: #9d91b0; }

    .modal-body { padding: 18px; display: flex; flex-direction: column; gap: 18px; }

    .setting-row {
      display: flex; flex-direction: column; gap: 8px;
    }
    .setting-label {
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #3a3458;
    }
    .setting-desc {
      font-size: 9px; color: #2a2840; line-height: 1.6; letter-spacing: 0.03em;
    }

    .toggle-row {
      display: flex; gap: 1px;
    }
    .tog {
      flex: 1; background: #0a0a0a; border: 0.5px solid #1e1e2e;
      color: #2e2848; font-family: inherit; font-size: 9px;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 7px 4px; cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .tog.active { background: #1a1628; border-color: #7b6fa5; color: #9d91b0; }
    .tog:hover:not(.active) { color: #7b6fa5; border-color: #2e2848; }

    .slider-row {
      display: flex; align-items: center; gap: 10px;
    }
    .slider-row input[type=range] {
      flex: 1; -webkit-appearance: none; height: 1px;
      background: #1e1e2e; outline: none; cursor: pointer;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 8px; height: 8px;
      border-radius: 50%; background: #7b6fa5; cursor: pointer;
    }
    .slider-val {
      font-size: 9px; color: #3a3458; min-width: 28px; text-align: right;
    }

    .modal-foot {
      padding: 12px 18px; border-top: 0.5px solid #1e1e2e;
      display: flex; justify-content: flex-end;
    }
    .modal-ok {
      background: none; border: 0.5px solid #2e2848; color: #7b6fa5;
      font-family: inherit; font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; padding: 7px 18px; cursor: pointer;
      transition: all 0.15s;
    }
    .modal-ok:hover { border-color: #7b6fa5; color: #9d91b0; }
  </style>
</head>
<body>

<canvas id="cv"></canvas>
<button id="mic-btn">enable mic</button>

<!-- control bar -->
<div id="bar">
  <button class="bar-btn" id="prev-vocab">←</button>
  <div id="bar-center">
    <span id="vocab-name">circles</span>
    <div id="meter"><div id="meter-fill"></div></div>
  </div>
  <button class="bar-btn" id="next-vocab">→</button>
  <button id="settings-btn">settings</button>
</div>

<!-- settings modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-head">
      <span class="modal-title">reactivity settings</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">

      <div class="setting-row">
        <span class="setting-label">speed source</span>
        <span class="setting-desc">which band drives wave speed</span>
        <div class="toggle-row">
          <button class="tog active" data-group="speed" data-val="bass">bass</button>
          <button class="tog" data-group="speed" data-val="mids">mids</button>
          <button class="tog" data-group="speed" data-val="treble">treble</button>
          <button class="tog" data-group="speed" data-val="amp">amp</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">density source</span>
        <span class="setting-desc">which band drives glyph density / brightness</span>
        <div class="toggle-row">
          <button class="tog" data-group="density" data-val="bass">bass</button>
          <button class="tog active" data-group="density" data-val="mids">mids</button>
          <button class="tog" data-group="density" data-val="treble">treble</button>
          <button class="tog" data-group="density" data-val="amp">amp</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">trail</span>
        <span class="setting-desc">how fast the field clears each frame</span>
        <div class="slider-row">
          <input type="range" id="trail-slider" min="5" max="95" value="35">
          <span class="slider-val" id="trail-val">35</span>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">sensitivity</span>
        <span class="setting-desc">amplify the incoming signal</span>
        <div class="slider-row">
          <input type="range" id="sens-slider" min="1" max="10" value="4">
          <span class="slider-val" id="sens-val">4×</span>
        </div>
      </div>

    </div>
    <div class="modal-foot">
      <button class="modal-ok" id="modal-ok">done</button>
    </div>
  </div>
</div>

<script>
  // ── VOCABULARIES ──────────────────────────────────────────
  const VOCABS = [
    { name: 'circles',    glyphs: [' ','·','∙','∘','○','◌','◎','⊙','●'] },
    { name: 'blocks',     glyphs: [' ','░','░','▒','▒','▓','▓','█','█'] },
    { name: 'dots',       glyphs: [' ','⠂','⠄','⠆','⠇','⠏','⠟','⠿','⣿'] },
    { name: 'crystals',   glyphs: [' ','·','+','×','✦','✧','⟡','❋','✺'] },
    { name: 'lines',      glyphs: [' ','╌','─','━','═','╠','╬','╦','╪'] },
    { name: 'kanji',      glyphs: [' ','一','二','三','口','日','目','回','囲'] },
    { name: 'ascii',      glyphs: [' ','.',':', ';','!','?','#','@','%'] },
    { name: 'braille',    glyphs: [' ','⠁','⠃','⠇','⠏','⠟','⠿','⡿','⣿'] },
  ];

  let vocabIdx = 0;
  const COLOR = '123,111,165';

  // ── SETTINGS STATE ────────────────────────────────────────
  const settings = {
    speedSrc:   'bass',
    densitySrc: 'mids',
    trail: 0.35,
    sensitivity: 4,
  };

  // ── CANVAS ───────────────────────────────────────────────
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let cols, rows, charW, charH, fontSize, vals;
  let frame = 0, lastT = 0;

  // ── AUDIO ─────────────────────────────────────────────────
  let analyser = null, freqData = null;
  let bass = 0, mids = 0, treble = 0, amp = 0;

  // ── DOM REFS ──────────────────────────────────────────────
  const bar        = document.getElementById('bar');
  const micBtn     = document.getElementById('mic-btn');
  const vocabName  = document.getElementById('vocab-name');
  const meterFill  = document.getElementById('meter-fill');
  const overlay    = document.getElementById('modal-overlay');
  const trailSlider = document.getElementById('trail-slider');
  const trailVal   = document.getElementById('trail-val');
  const sensSlider = document.getElementById('sens-slider');
  const sensVal    = document.getElementById('sens-val');

  // ── RESIZE ────────────────────────────────────────────────
  function resize() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
    fontSize = Math.round(Math.min(cv.width, cv.height) * 0.018);
    ctx.font = `300 ${fontSize}px "IBM Plex Mono"`;
    charW = ctx.measureText('·').width;
    charH = fontSize * 1.2;
    cols = Math.ceil(cv.width  / charW) + 1;
    rows = Math.ceil(cv.height / charH) + 1;
    vals = new Float32Array(cols * rows);
  }

  // ── AUDIO READ ────────────────────────────────────────────
  function readAudio() {
    if (!analyser) return;
    analyser.getByteFrequencyData(freqData);
    const len = freqData.length;
    const s = settings.sensitivity;

    let b = 0; for (let i = 0; i < 6;  i++) b += freqData[i];
    let m = 0; for (let i = 6; i < 40; i++) m += freqData[i];
    let h = 0; for (let i = 40; i < 90; i++) h += freqData[i];
    let a = 0; for (let i = 0; i < len; i++) a += freqData[i];

    bass   = Math.min(1, (b / (6   * 255)) * s);
    mids   = Math.min(1, (m / (34  * 255)) * s);
    treble = Math.min(1, (h / (50  * 255)) * s);
    amp    = Math.min(1, (a / (len * 255)) * s);

    meterFill.style.width = (amp * 100) + '%';
  }

  function getBand(name) {
    return { bass, mids, treble, amp }[name] ?? amp;
  }

  // ── RENDER ────────────────────────────────────────────────
  function render(ts) {
    requestAnimationFrame(render);
    if (ts - lastT < 1000 / 24) return;
    lastT = ts;

    readAudio();

    const glyphs = VOCABS[vocabIdx].glyphs;
    const gN = glyphs.length - 1;

    const speedVal   = getBand(settings.speedSrc);
    const densityVal = getBand(settings.densitySrc);

    const t      = frame * (0.022 + speedVal * 0.08);
    const freq   = 0.13 + densityVal * 0.15;
    const bright = 0.2  + amp * 2.0;
    const fade   = analyser ? Math.min(1, settings.trail + amp * 0.4) : 0.06;

    ctx.fillStyle = `rgba(10,10,10,${fade})`;
    ctx.fillRect(0, 0, cv.width, cv.height);

    ctx.font = `300 ${fontSize}px "IBM Plex Mono"`;
    ctx.textBaseline = 'top';
    ctx.fillStyle = `rgb(${COLOR})`;

    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        vals[r * cols + c] = Math.max(0, Math.min(1,
          (Math.sin(c * freq + t) + Math.cos(r * 0.09 - t * 0.6) + 2) / 4));

    const ALPHAS = [0.15, 0.4, 0.7, 1.0];
    for (let p = 0; p < 4; p++) {
      const vMin = p * 0.25, vMax = vMin + 0.25;
      ctx.globalAlpha = Math.min(1, ALPHAS[p] * bright);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const v = vals[r * cols + c];
          if (v < vMin || v >= vMax) continue;
          const g = glyphs[Math.round(v * gN)];
          if (!g || g === ' ') continue;
          ctx.fillText(g, c * charW, r * charH);
        }
      }
    }
    ctx.globalAlpha = 1;
    frame++;
  }

  // ── MIC ───────────────────────────────────────────────────
  async function startMic() {
    try {
      const stream   = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      const audioCtx = new AudioContext();
      const source   = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.1;
      freqData = new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);
      micBtn.classList.add('hidden');
      bar.classList.add('visible');
    } catch (e) {
      micBtn.textContent = 'mic denied';
    }
  }

  // ── VOCAB NAV ─────────────────────────────────────────────
  function setVocab(idx) {
    vocabIdx = (idx + VOCABS.length) % VOCABS.length;
    vocabName.textContent = VOCABS[vocabIdx].name;
  }

  document.getElementById('prev-vocab').addEventListener('click', () => setVocab(vocabIdx - 1));
  document.getElementById('next-vocab').addEventListener('click', () => setVocab(vocabIdx + 1));

  // ── SETTINGS MODAL ────────────────────────────────────────
  function openModal()  { overlay.classList.add('visible'); }
  function closeModal() { overlay.classList.remove('visible'); }

  document.getElementById('settings-btn').addEventListener('click', openModal);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-ok').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  // toggle buttons
  document.querySelectorAll('.tog').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.group;
      document.querySelectorAll(`.tog[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (group === 'speed')   settings.speedSrc   = btn.dataset.val;
      if (group === 'density') settings.densitySrc = btn.dataset.val;
    });
  });

  // sliders
  trailSlider.addEventListener('input', () => {
    settings.trail = parseInt(trailSlider.value) / 100;
    trailVal.textContent = trailSlider.value;
  });
  sensSlider.addEventListener('input', () => {
    settings.sensitivity = parseInt(sensSlider.value);
    sensVal.textContent = sensSlider.value + '×';
  });

  micBtn.addEventListener('click', startMic);
  window.addEventListener('resize', resize);

  document.fonts.ready.then(() => {
    resize();
    requestAnimationFrame(render);
  });
</script>

</body>
</html>
