<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mantas Lilis — Human Participant</title>
<style>
  :root {
    --void: #050608;
    --card: #0c0d10;
    --card-edge: rgba(255,255,255,0.08);
    --ink: #e7e7ea;
    --ink-soft: #8a8d94;
    --ink-dim: #4a4d55;
    --accent: #c9cdd4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--void);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Inter", system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .void {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    opacity: 0.035;
    mix-blend-mode: screen;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .stage {
    position: relative;
    z-index: 2;
    height: 100%;
    display: grid;
    place-items: center;
    perspective: 1600px;
  }

  .card {
    position: relative;
    width: min(360px, 86vw);
    aspect-ratio: 5 / 7.2;
    border-radius: 14px;
    background:
      radial-gradient(120% 120% at 30% 0%, rgba(255,255,255,0.045), transparent 55%),
      linear-gradient(180deg, #101116 0%, #0a0b0e 100%);
    border: 1px solid var(--card-edge);
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,0.9),
      0 0 0 1px rgba(255,255,255,0.02),
      inset 0 1px 0 rgba(255,255,255,0.04);
    overflow: hidden;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(.2,.8,.2,1);
    animation: breathe 7s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 40px 80px -30px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.02), inset 0 1px 0 rgba(255,255,255,0.04), 0 0 60px -20px rgba(200,210,230,0.05); }
    50%      { box-shadow: 0 40px 80px -30px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.02), inset 0 1px 0 rgba(255,255,255,0.04), 0 0 80px -10px rgba(200,210,230,0.12); }
  }

  .card .surface {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.9;
  }

  .card .sheen {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(
      600px 400px at var(--mx, 50%) var(--my, 0%),
      rgba(255,255,255,0.06),
      transparent 45%
    );
    transition: background 0.3s ease;
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 3;
    padding: 26px 26px 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.02em;
  }

  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .org {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .dept {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  .punch {
    width: 34px;
    height: 8px;
    border-radius: 99px;
    background: #020304;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.9),
      inset 0 -1px 0 rgba(255,255,255,0.04);
  }

  .center {
    text-align: left;
  }
  .label {
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }
  .name {
    font-family: ui-sans-serif, "Inter", system-ui, sans-serif;
    font-weight: 300;
    font-size: clamp(28px, 4.6vw, 36px);
    line-height: 1.02;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .name em {
    font-style: normal;
    color: var(--accent);
  }
  .role {
    margin-top: 14px;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .role::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 99px;
    background: #c9cdd4;
    box-shadow: 0 0 8px rgba(201,205,212,0.6);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.9); }
    50%      { opacity: 1;   transform: scale(1.1); }
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .bottom .line {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .bottom .val { color: var(--ink-soft); }

  .barcode {
    display: flex;
    align-items: flex-end;
    gap: 1px;
    height: 18px;
  }
  .barcode span {
    display: block;
    width: 1px;
    background: var(--ink-soft);
    opacity: 0.55;
  }

  .hint {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    z-index: 4;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    pointer-events: none;
  }

  @media (max-width: 520px), (max-height: 620px) {
    html, body {
      height: 100svh;
    }

    .stage {
      height: 100svh;
      padding: 18px 16px 54px;
    }

    .card {
      width: min(calc(100vw - 32px), calc((100svh - 86px) * 0.694), 360px);
      border-radius: 12px;
    }

    .content {
      padding: clamp(18px, 6vw, 24px) clamp(18px, 6vw, 24px) clamp(16px, 5vw, 22px);
    }

    .org {
      font-size: clamp(8px, 2.5vw, 10px);
      letter-spacing: 0.18em;
    }

    .dept {
      font-size: clamp(8px, 2.5vw, 10px);
      letter-spacing: 0.12em;
    }

    .punch {
      width: 30px;
    }

    .label {
      font-size: clamp(8px, 2.4vw, 9px);
      letter-spacing: 0.24em;
    }

    .name {
      font-size: clamp(27px, 10vw, 34px);
    }

    .role {
      font-size: clamp(8px, 2.5vw, 10px);
      letter-spacing: 0.2em;
      gap: 6px;
    }

    .bottom {
      gap: 10px;
      font-size: clamp(8px, 2.3vw, 9px);
      letter-spacing: 0.16em;
    }

    .barcode {
      flex: 0 1 auto;
      transform: scaleX(0.86);
      transform-origin: center bottom;
    }

    .hint {
      bottom: 14px;
      padding: 0 20px;
      font-size: 9px;
      line-height: 1.5;
      letter-spacing: 0.12em;
    }
  }

  @media (max-width: 360px) {
    .content {
      padding: 17px 17px 15px;
    }

    .role {
      letter-spacing: 0.14em;
    }

    .barcode span:nth-child(n+29) {
      display: none;
    }
  }

  @media (hover: none) {
    .hint {
      display: none;
    }
  }
</style>
</head>
<body>

<canvas class="void" id="void"></canvas>
<div class="grain"></div>

<div class="stage">
  <article class="card" id="card" aria-label="Credential: Mantas Lilis, Human Participant, Curiosity Inc.">
    <canvas class="surface" id="surface"></canvas>
    <div class="sheen"></div>

    <div class="content">
      <header class="top">
        <div>
          <div class="org">Curiosity, Inc.</div>
          <div class="dept">Interaction Department</div>
        </div>
        <div class="punch" aria-hidden="true"></div>
      </header>

      <section class="center">
        <div class="label">Credential</div>
        <h1 class="name">Mantas<br/><em>Lilis</em></h1>
        <div class="role">Human Participant</div>
      </section>

      <footer class="bottom">
        <div class="line">
          <span>ID</span>
          <span class="val" id="serial">—</span>
        </div>
        <div class="barcode" id="barcode" aria-hidden="true"></div>
        <div class="line" style="text-align:right;">
          <span>Issued</span>
          <span class="val" id="issued">—</span>
        </div>
      </footer>
    </div>
  </article>
</div>

<div class="hint">hover · move · the surface is alive</div>

<script>
/* ---------- Void: distant particles ---------- */
(() => {
  const c = document.getElementById('void');
  const ctx = c.getContext('2d');
  let w, h, dpr, stars;

  function size() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = c.width  = innerWidth  * dpr;
    h = c.height = innerHeight * dpr;
    c.style.width = innerWidth + 'px';
    c.style.height = innerHeight + 'px';
    seed();
  }

  function seed() {
    const count = Math.floor((innerWidth * innerHeight) / 6000);
    stars = Array.from({length: count}, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      z: Math.random() * 0.8 + 0.2,        // depth 0.2 – 1
      vx: (Math.random() - 0.5) * 0.05 * dpr,
      vy: (Math.random() - 0.5) * 0.05 * dpr,
      tw: Math.random() * Math.PI * 2
    }));
  }

  function frame(t) {
    ctx.fillStyle = 'rgba(5,6,8,0.35)';
    ctx.fillRect(0, 0, w, h);
    for (const s of stars) {
      s.x += s.vx; s.y += s.vy;
      if (s.x < 0) s.x = w; if (s.x > w) s.x = 0;
      if (s.y < 0) s.y = h; if (s.y > h) s.y = 0;
      const a = (0.25 + 0.55 * s.z) * (0.6 + 0.4 * Math.sin(t * 0.001 + s.tw));
      const r = (s.z * 1.2) * dpr;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(230,235,245,${a.toFixed(3)})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  addEventListener('resize', size);
  size();
  requestAnimationFrame(frame);
})();

/* ---------- Card: living surface (flow field) ---------- */
(() => {
  const c = document.getElementById('surface');
  const ctx = c.getContext('2d');
  let w, h, dpr, particles, t = 0;

  function size() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const r = c.getBoundingClientRect();
    w = c.width  = r.width  * dpr;
    h = c.height = r.height * dpr;
    c.style.width = r.width + 'px';
    c.style.height = r.height + 'px';
    seed();
  }

  function seed() {
    particles = Array.from({length: 90}, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      life: Math.random() * 200
    }));
    ctx.clearRect(0,0,w,h);
  }

  // pseudo-noise flow field
  function angle(x, y, tt) {
    const s = 0.004;
    return (Math.sin(x * s + tt * 0.0004) + Math.cos(y * s * 1.3 - tt * 0.0003)) * Math.PI;
  }

  function frame() {
    t++;
    // slow fade — trails
    ctx.fillStyle = 'rgba(10,11,14,0.08)';
    ctx.fillRect(0, 0, w, h);

    for (const p of particles) {
      const a = angle(p.x, p.y, t);
      p.x += Math.cos(a) * 0.5 * dpr;
      p.y += Math.sin(a) * 0.5 * dpr;
      p.life--;

      if (p.life <= 0 || p.x < 0 || p.x > w || p.y < 0 || p.y > h) {
        p.x = Math.random() * w;
        p.y = Math.random() * h;
        p.life = 200 + Math.random() * 200;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, 0.6 * dpr, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,210,230,0.18)';
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  addEventListener('resize', size);
  // wait a tick for layout
  requestAnimationFrame(() => { size(); frame(); });
})();

/* ---------- Card: tilt + sheen follow ---------- */
(() => {
  const card = document.getElementById('card');
  let rx = 0, ry = 0, tx = 0, ty = 0;

  function onMove(e) {
    const r = card.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = (e.clientX - cx) / r.width;
    const dy = (e.clientY - cy) / r.height;
    tx = dy * -6;   // rotateX
    ty = dx *  8;   // rotateY
    card.style.setProperty('--mx', `${((e.clientX - r.left) / r.width) * 100}%`);
    card.style.setProperty('--my', `${((e.clientY - r.top)  / r.height) * 100}%`);
  }

  function onLeave() { tx = 0; ty = 0; }

  function raf() {
    rx += (tx - rx) * 0.08;
    ry += (ty - ry) * 0.08;
    card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) translateZ(0)`;
    requestAnimationFrame(raf);
  }

  addEventListener('mousemove', onMove);
  addEventListener('mouseleave', onLeave);
  raf();
})();

/* ---------- Credential details ---------- */
(() => {
  const serial = () => {
    const hex = 'ABCDEF0123456789';
    const part = n => Array.from({length: n}, () => hex[Math.floor(Math.random()*hex.length)]).join('');
    return `${part(4)} · ${part(4)} · ${part(2)}`;
  };
  document.getElementById('serial').textContent = serial();

  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  document.getElementById('issued').textContent = `${yy}.${mm}.${dd}`;

  // barcode
  const bar = document.getElementById('barcode');
  const bars = 34;
  for (let i = 0; i < bars; i++) {
    const s = document.createElement('span');
    s.style.height = `${6 + Math.random() * 12}px`;
    s.style.opacity = (0.35 + Math.random() * 0.5).toFixed(2);
    bar.appendChild(s);
  }
})();
</script>
</body>
</html>
