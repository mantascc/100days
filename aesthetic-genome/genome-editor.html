<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>genome editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #f5f5f7;
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .editor {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 1px;
            background: #2a2a2a;
        }

        /* left panel: projects */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            border-right: 1px solid #2a2a2a;
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
        }

        .search-input {
            width: 100%;
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #f5f5f7;
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
            font-size: 12px;
            border-radius: 2px;
        }

        .search-input::placeholder {
            color: #666666;
        }

        .search-input:focus {
            outline: none;
            border-color: #00a8ff;
        }

        .projects-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .project-card {
            padding: 12px;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }

        .project-card:hover {
            background: #1a1a1a;
        }

        .project-card.active {
            background: #1a1a1a;
            border-left-color: #00a8ff;
        }

        .project-id {
            font-size: 12px;
            color: #00a8ff;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .project-meta {
            font-size: 10px;
            color: #666666;
            margin-bottom: 6px;
        }

        .project-chart {
            width: 100%;
            height: 16px;
            background: #1a1a1a;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 1px;
            padding: 2px;
            border: 1px solid #2a2a2a;
        }

        .chart-bar {
            flex: 1;
            height: 12px;
            background: #2a2a2a;
            border-radius: 1px;
            opacity: 0.6;
        }

        .chart-bar.continuous {
            background: linear-gradient(to right, #2a2a2a, #00a8ff);
        }

        /* right panel: detail */
        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .detail-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666666;
        }

        .detail-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            position: sticky;
            top: 0;
            background: #0a0a0a;
            z-index: 10;
        }

        .detail-title {
            font-size: 16px;
            color: #00a8ff;
            margin-bottom: 4px;
        }

        .detail-meta {
            font-size: 10px;
            color: #666666;
            margin-bottom: 12px;
        }

        .confidence-bar {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .confidence-fill {
            height: 100%;
            background: #00a8ff;
            transition: width 0.2s;
        }

        .detail-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .axis-group {
            margin-bottom: 24px;
        }

        .axis-label {
            font-size: 10px;
            color: #a8aab8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .axis-status {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 2px;
            background: #1a1a1a;
            color: #a8aab8;
        }

        .axis-status.proposed {
            color: #666666;
        }

        .axis-status.corrected {
            color: #00a8ff;
            background: #0f1f2f;
        }

        .axis-status.confirmed {
            color: #00d97e;
            background: #0f2f1f;
        }

        /* slider styling */
        .slider-container {
            position: relative;
            margin-bottom: 8px;
        }

        .slider-track {
            width: 100%;
            height: 6px;
            background: #1a1a1a;
            border-radius: 2px;
            position: relative;
            border: 1px solid #2a2a2a;
        }

        .slider-proposed {
            position: absolute;
            height: 100%;
            background: #333333;
            border-radius: 2px;
            top: 0;
            left: 0;
            opacity: 0.5;
        }

        .slider-fill {
            position: absolute;
            height: 100%;
            background: #00a8ff;
            border-radius: 2px;
            top: 0;
            left: 0;
            opacity: 0.3;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: transparent;
            border: none;
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            position: relative;
            z-index: 5;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #00a8ff;
            border-radius: 2px;
            cursor: pointer;
            box-shadow: 0 0 0 1px #0a0a0a;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #00a8ff;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            box-shadow: 0 0 0 1px #0a0a0a;
        }

        .slider-values {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #666666;
            margin-top: 2px;
        }

        .slider-value {
            min-width: 20px;
            text-align: center;
        }

        /* segmented buttons */
        .buttons-group {
            display: flex;
            gap: 1px;
            background: #1a1a1a;
            padding: 1px;
            border-radius: 2px;
            border: 1px solid #2a2a2a;
        }

        .button-option {
            flex: 1;
            padding: 8px;
            background: #0a0a0a;
            border: none;
            color: #a8aab8;
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: lowercase;
        }

        .button-option:hover {
            color: #f5f5f7;
        }

        .button-option.active {
            background: #00a8ff;
            color: #0a0a0a;
        }

        /* bottom bar */
        .footer {
            padding: 12px 20px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
            font-size: 11px;
            color: #666666;
        }

        .stats {
            display: flex;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .stat-label {
            color: #a8aab8;
        }

        .stat-value {
            color: #00a8ff;
            font-weight: bold;
        }

        .button-primary {
            padding: 8px 12px;
            background: #00a8ff;
            color: #0a0a0a;
            border: none;
            border-radius: 2px;
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: lowercase;
        }

        .button-primary:hover {
            background: #00c9ff;
        }

        .button-primary:active {
            background: #0088cc;
        }

        .button-secondary {
            padding: 8px 12px;
            background: #1a1a1a;
            color: #a8aab8;
            border: 1px solid #2a2a2a;
            border-radius: 2px;
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: lowercase;
            margin-right: 8px;
        }

        .button-secondary:hover {
            color: #f5f5f7;
            border-color: #00a8ff;
        }

        /* scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }

        /* responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 280px;
            }

            .detail-content {
                padding: 16px;
            }
        }

        @media (max-width: 768px) {
            .editor {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 40%;
                border-right: none;
                border-bottom: 1px solid #2a2a2a;
            }

            .detail-panel {
                flex: 1;
            }
        }

        /* keyboard focus */
        .project-card:focus {
            outline: 1px solid #00a8ff;
        }

        /* error state */
        .error-message {
            padding: 12px;
            background: #2f1f1f;
            border: 1px solid #664444;
            border-radius: 2px;
            color: #ff6b6b;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="editor">
            <!-- left sidebar: projects list -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <input
                        type="text"
                        class="search-input"
                        id="searchInput"
                        placeholder="search projects"
                    >
                </div>
                <div class="projects-list" id="projectsList"></div>
            </div>

            <!-- right panel: detail view -->
            <div class="detail-panel" id="detailPanel">
                <div class="detail-empty">load genome-proposed.json to start</div>
            </div>
        </div>

        <!-- bottom bar: stats & export -->
        <div class="footer">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">corrected:</span>
                    <span class="stat-value" id="correctedCount">0</span>
                    <span class="stat-label">/ <span id="totalCount">0</span></span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">files:</span>
                    <span class="stat-value" id="filesCount">—</span>
                </div>
            </div>
            <div>
                <button class="button-secondary" id="confirmAllBtn">confirm all proposed</button>
                <button class="button-primary" id="exportBtn">export genome.json</button>
            </div>
        </div>
    </div>

    <script>
        // constants
        const CONTINUOUS_AXES = [
            'density',
            'agency',
            'legibility',
            'determinism',
            'complexity',
            'physicality',
            'palette_restraint',
            'motion_character'
        ];

        const CATEGORICAL_AXES = {
            material: ['digital', 'physical', 'hybrid'],
            temporal_mode: ['static', 'dynamic', 'adaptive'],
            referent: ['abstract', 'gestural', 'representational', 'literal'],
            scale: ['intimate', 'human', 'monumental', 'cosmic']
        };

        // app state
        let genomeData = null;
        let selectedProjectId = null;
        let filteredProjects = [];

        // load data
        async function loadGenome() {
            try {
                const response = await fetch('genome-proposed.json');
                if (!response.ok) {
                    showError(`Failed to load genome-proposed.json: ${response.status}`);
                    return;
                }
                const raw = await response.json();
                // normalize: convert genomes array to projects object keyed by id
                genomeData = { ...raw, projects: {} };
                if (Array.isArray(raw.genomes)) {
                    raw.genomes.forEach(g => {
                        // normalize field names for editor
                        genomeData.projects[g.id] = {
                            ...g,
                            vector: g.continuous || g.vector || {},
                            metadata: {
                                file_count: g.meta?.file_count || 0,
                                lines_of_code: g.meta?.code_lines || 0,
                                confidence: g.confidence || 0,
                                rendering: g.meta?.rendering || 'unknown',
                                total_bytes: g.meta?.total_bytes || 0,
                                has_external_deps: g.meta?.has_external_deps || false
                            },
                            categories: g.categorical || {}
                        };
                    });
                } else if (raw.projects) {
                    genomeData.projects = raw.projects;
                }
                filteredProjects = Object.keys(genomeData.projects);
                renderProjectsList();
                updateStats();
            } catch (error) {
                showError(`Error loading genome-proposed.json: ${error.message}`);
            }
        }

        function showError(message) {
            const panel = document.getElementById('detailPanel');
            panel.innerHTML = `<div style="padding: 20px;"><div class="error-message">${escapeHtml(message)}</div></div>`;
        }

        // render projects list
        function renderProjectsList() {
            const list = document.getElementById('projectsList');
            list.innerHTML = '';

            filteredProjects.forEach((projectId) => {
                const project = genomeData.projects[projectId];
                const card = document.createElement('div');
                card.className = 'project-card';
                if (projectId === selectedProjectId) {
                    card.classList.add('active');
                }

                card.setAttribute('data-project-id', projectId);
                card.setAttribute('tabindex', '0');

                // calculate status
                const status = getProjectStatus(projectId);

                card.innerHTML = `
                    <div class="project-id">${escapeHtml(projectId)}</div>
                    <div class="project-meta">
                        ${project.metadata?.file_count || 0} files
                        ${project.metadata?.confidence ? `• ${Math.round(project.metadata.confidence * 100)}%` : ''}
                    </div>
                    <div class="project-chart">${renderMiniChart(project)}</div>
                `;

                card.addEventListener('click', () => selectProject(projectId));
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        navigateProjects(e.key === 'ArrowUp' ? -1 : 1);
                    } else if (e.key === 'Enter') {
                        selectProject(projectId);
                    }
                });

                list.appendChild(card);
            });

            // if nothing selected, select first
            if (!selectedProjectId && filteredProjects.length > 0) {
                selectProject(filteredProjects[0]);
            }
        }

        function renderMiniChart(project) {
            const vector = project.vector || {};
            let html = '';
            CONTINUOUS_AXES.forEach((axis) => {
                const value = vector[axis] ?? 0.5;
                const style = `width: ${value * 100}%; background: #00a8ff;`;
                html += `<div class="chart-bar continuous" style="${style}"></div>`;
            });
            return html;
        }

        // select project
        function selectProject(projectId) {
            selectedProjectId = projectId;
            renderProjectsList();
            renderDetail();
        }

        // navigate projects with keyboard
        function navigateProjects(direction) {
            const index = filteredProjects.indexOf(selectedProjectId);
            let newIndex = index + direction;
            if (newIndex < 0) newIndex = filteredProjects.length - 1;
            if (newIndex >= filteredProjects.length) newIndex = 0;
            selectProject(filteredProjects[newIndex]);
        }

        // render detail panel
        function renderDetail() {
            const panel = document.getElementById('detailPanel');

            if (!selectedProjectId) {
                panel.innerHTML = '<div class="detail-empty">select a project</div>';
                return;
            }

            const project = genomeData.projects[selectedProjectId];
            const vector = project.vector || {};
            const status = getProjectStatus(selectedProjectId);

            let html = `
                <div class="detail-header">
                    <div class="detail-title">${escapeHtml(selectedProjectId)}</div>
                    <div class="detail-meta">
                        ${project.metadata?.file_count || 0} files •
                        ${project.metadata?.lines_of_code || 0} lines •
                        ${project.metadata?.rendering || 'unknown'}
                    </div>
                    <div class="detail-meta">confidence: ${project.metadata?.confidence ? Math.round(project.metadata.confidence * 100) + '%' : 'unknown'}</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${(project.metadata?.confidence ?? 0.5) * 100}%"></div>
                    </div>
                </div>
                <div class="detail-content">
            `;

            // continuous axes
            html += '<div style="margin-bottom: 32px;">';
            CONTINUOUS_AXES.forEach((axis) => {
                const proposedValue = vector[axis] ?? 0.5;
                const currentValue = localStorage.getItem(`${selectedProjectId}:${axis}`);
                const value = currentValue !== null ? parseFloat(currentValue) : proposedValue;
                const isModified = currentValue !== null;

                html += `
                    <div class="axis-group">
                        <div class="axis-label">
                            <span>${escapeHtml(axis)}</span>
                            <span class="axis-status ${isModified ? 'corrected' : 'proposed'}">
                                ${isModified ? 'corrected' : 'proposed'}
                            </span>
                        </div>
                        <div class="slider-container" data-axis="${axis}">
                            <div class="slider-track">
                                <div class="slider-proposed" style="width: ${proposedValue * 100}%"></div>
                                <div class="slider-fill" style="width: ${value * 100}%; background: #00a8ff;"></div>
                            </div>
                            <input
                                type="range"
                                class="slider"
                                data-axis="${axis}"
                                min="0"
                                max="1"
                                step="0.05"
                                value="${value}"
                                data-proposed="${proposedValue}"
                            >
                        </div>
                        <div class="slider-values">
                            <span class="slider-value">ghost: ${proposedValue.toFixed(2)}</span>
                            <span class="slider-value">current: ${value.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            // categorical axes
            html += '<div>';
            Object.entries(CATEGORICAL_AXES).forEach(([axis, options]) => {
                const categories = project.categories || {};
                const proposedValue = categories[axis] || options[0];
                const currentValue = localStorage.getItem(`${selectedProjectId}:${axis}`);
                const value = currentValue || proposedValue;
                const isModified = currentValue !== null;

                html += `
                    <div class="axis-group">
                        <div class="axis-label">
                            <span>${escapeHtml(axis)}</span>
                            <span class="axis-status ${isModified ? 'corrected' : 'proposed'}">
                                ${isModified ? 'corrected' : 'proposed'}
                            </span>
                        </div>
                        <div class="buttons-group">
                            ${options.map(opt => `
                                <button
                                    class="button-option ${opt === value ? 'active' : ''}"
                                    data-axis="${axis}"
                                    data-value="${opt}"
                                >
                                    ${escapeHtml(opt)}
                                </button>
                            `).join('')}
                        </div>
                        <div class="slider-values" style="margin-top: 4px;">
                            <span class="slider-value">proposed: ${escapeHtml(proposedValue)}</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            html += '</div>';

            panel.innerHTML = html;

            // attach event listeners
            document.querySelectorAll('input[type="range"].slider').forEach((slider) => {
                slider.addEventListener('input', (e) => {
                    const axis = e.target.dataset.axis;
                    const value = e.target.value;
                    localStorage.setItem(`${selectedProjectId}:${axis}`, value);
                    updateSliderDisplay(axis);
                    updateStats();
                    renderProjectsList();
                });
            });

            document.querySelectorAll('.button-option').forEach((btn) => {
                btn.addEventListener('click', (e) => {
                    const axis = e.target.dataset.axis;
                    const value = e.target.dataset.value;
                    localStorage.setItem(`${selectedProjectId}:${axis}`, value);
                    renderDetail();
                    updateStats();
                    renderProjectsList();
                });
            });
        }

        function updateSliderDisplay(axis) {
            const slider = document.querySelector(`.slider[data-axis="${axis}"]`);
            if (!slider) return;

            const container = slider.closest('.slider-container');
            const value = parseFloat(slider.value);
            const fillDiv = container.querySelector('.slider-fill');
            const valuesDiv = container.querySelector('.slider-values');

            if (fillDiv) {
                fillDiv.style.width = `${value * 100}%`;
            }

            if (valuesDiv) {
                const proposed = parseFloat(slider.dataset.proposed);
                valuesDiv.innerHTML = `
                    <span class="slider-value">ghost: ${proposed.toFixed(2)}</span>
                    <span class="slider-value">current: ${value.toFixed(2)}</span>
                `;
            }
        }

        // search filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!genomeData) return;

            filteredProjects = Object.keys(genomeData.projects || {}).filter((id) => {
                return id.toLowerCase().includes(query);
            });

            // reset selection if filtered out
            if (!filteredProjects.includes(selectedProjectId)) {
                selectedProjectId = null;
            }

            renderProjectsList();
        });

        // confirm all button
        document.getElementById('confirmAllBtn').addEventListener('click', () => {
            if (!selectedProjectId) return;

            const project = genomeData.projects[selectedProjectId];
            const vector = project.vector || {};

            // copy all proposed values to local storage
            CONTINUOUS_AXES.forEach((axis) => {
                const value = vector[axis] ?? 0.5;
                localStorage.setItem(`${selectedProjectId}:${axis}`, value);
            });

            Object.keys(CATEGORICAL_AXES).forEach((axis) => {
                const categories = project.categories || {};
                const value = categories[axis] || CATEGORICAL_AXES[axis][0];
                localStorage.setItem(`${selectedProjectId}:${axis}`, value);
            });

            renderDetail();
            updateStats();
            renderProjectsList();
        });

        // export button
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!genomeData) return;

            const exported = {
                schema: 'aesthetic-genome-v1',
                generated: new Date().toISOString(),
                method: 'hybrid/human-corrected',
                project_count: Object.keys(genomeData.projects).length,
                genomes: []
            };

            Object.keys(genomeData.projects).forEach((projectId) => {
                const project = genomeData.projects[projectId];
                const continuous = { ...(project.vector || {}) };
                const categorical = { ...(project.categories || {}) };

                // apply corrections from localStorage
                let corrected = false;
                CONTINUOUS_AXES.forEach((axis) => {
                    const saved = localStorage.getItem(`${projectId}:${axis}`);
                    if (saved !== null) {
                        continuous[axis] = parseFloat(saved);
                        corrected = true;
                    }
                });

                Object.keys(CATEGORICAL_AXES).forEach((axis) => {
                    const saved = localStorage.getItem(`${projectId}:${axis}`);
                    if (saved !== null) {
                        categorical[axis] = saved;
                        corrected = true;
                    }
                });

                exported.genomes.push({
                    id: projectId,
                    description: project.description || '',
                    status: corrected ? 'corrected' : 'proposed',
                    confidence: project.metadata?.confidence || 0,
                    continuous,
                    categorical,
                    meta: {
                        file_count: project.metadata?.file_count || 0,
                        code_lines: project.metadata?.lines_of_code || 0,
                        total_bytes: project.metadata?.total_bytes || 0,
                        has_external_deps: project.metadata?.has_external_deps || false,
                        rendering: project.metadata?.rendering || 'unknown'
                    }
                });
            });

            downloadJSON(exported, 'genome.json');
        });

        // utility functions
        function getProjectStatus(projectId) {
            const project = genomeData.projects[projectId];
            const vector = project.vector || {};
            let status = 'proposed';

            CONTINUOUS_AXES.forEach((axis) => {
                if (localStorage.getItem(`${projectId}:${axis}`) !== null) {
                    status = 'corrected';
                }
            });

            return status;
        }

        function updateStats() {
            if (!genomeData) return;

            const totalAxes = Object.keys(genomeData.projects).reduce((sum, projectId) => {
                return sum + CONTINUOUS_AXES.length + Object.keys(CATEGORICAL_AXES).length;
            }, 0);

            let correctedAxes = 0;
            Object.keys(genomeData.projects).forEach((projectId) => {
                CONTINUOUS_AXES.forEach((axis) => {
                    if (localStorage.getItem(`${projectId}:${axis}`) !== null) {
                        correctedAxes++;
                    }
                });

                Object.keys(CATEGORICAL_AXES).forEach((axis) => {
                    if (localStorage.getItem(`${projectId}:${axis}`) !== null) {
                        correctedAxes++;
                    }
                });
            });

            document.getElementById('correctedCount').textContent = correctedAxes;
            document.getElementById('totalCount').textContent = totalAxes;

            if (selectedProjectId) {
                const project = genomeData.projects[selectedProjectId];
                document.getElementById('filesCount').textContent = project.metadata?.file_count || '—';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadJSON(data, filename) {
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // initialization
        loadGenome();
    </script>
</body>
</html>
